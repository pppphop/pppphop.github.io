<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OS 背记刷题</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --soft: #eef7f2;
      --ink: #172033;
      --muted: #66758a;
      --line: #dce3eb;
      --accent: #2f7d62;
      --accent-2: #7b5e2e;
      --good: #188657;
      --bad: #c2413b;
      --shadow: 0 18px 42px rgba(23, 32, 51, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #edf7f3 0, var(--bg) 360px);
      letter-spacing: 0;
    }

    button, input, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(26px, 5vw, 44px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .home-link,
    .tab,
    .mode-btn,
    .plain-btn,
    .primary-btn,
    .danger-btn {
      min-height: 38px;
      padding: 0 13px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      text-decoration: none;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      background: rgba(255, 255, 255, 0.82);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .tabs,
    .mode-switch,
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tab.active,
    .mode-btn.active,
    .plain-btn.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .primary-btn {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .danger-btn {
      color: var(--bad);
      border-color: rgba(194, 65, 59, 0.35);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 16px;
      align-items: start;
    }

    .quiz-panel,
    .side-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .quiz-panel {
      min-height: 560px;
      display: flex;
      flex-direction: column;
    }

    .question-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--line);
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 13px;
      background: var(--soft);
      color: var(--accent);
      border: 1px solid rgba(47, 125, 98, 0.18);
    }

    .badge.source {
      color: var(--accent-2);
      background: #f7f1e7;
      border-color: rgba(123, 94, 46, 0.18);
    }

    .counter {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .question-body {
      padding: 22px 20px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .prompt {
      margin: 0 0 18px;
      font-size: clamp(20px, 3.2vw, 26px);
      line-height: 1.55;
      font-weight: 700;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .option-btn {
      width: 100%;
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-height: 54px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      text-align: left;
    }

    .option-btn .letter {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #edf2f7;
      font-weight: 700;
    }

    .option-btn.selected { border-color: var(--accent); background: #f1fbf6; }
    .option-btn.correct { border-color: rgba(24, 134, 87, 0.6); background: #eefaf4; }
    .option-btn.wrong { border-color: rgba(194, 65, 59, 0.55); background: #fff1f1; }

    .answer-box {
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--ink);
      background: #fff;
      resize: vertical;
      outline: none;
    }

    .answer-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 125, 98, 0.12);
    }

    textarea.answer-box {
      min-height: 150px;
      line-height: 1.7;
    }

    .feedback {
      min-height: 74px;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px dashed var(--line);
      background: #f8fafc;
      color: var(--muted);
      line-height: 1.65;
    }

    .feedback.good { color: var(--good); border-color: rgba(24, 134, 87, 0.35); background: #f0fbf6; }
    .feedback.bad { color: var(--bad); border-color: rgba(194, 65, 59, 0.35); background: #fff5f4; }

    .feedback .answer {
      display: block;
      margin-top: 6px;
      color: var(--ink);
      word-break: break-word;
    }

    .actions { padding: 0 20px 20px; }
    .side-panel { padding: 16px; }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .metric strong {
      display: block;
      font-size: 24px;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    .metric span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .progress-shell {
      height: 10px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
      margin: 8px 0 18px;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), #3f8fb0);
      transition: width 0.2s ease;
    }

    .mini-title {
      margin: 16px 0 8px;
      font-size: 15px;
      color: var(--ink);
    }

    .mistakes {
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
      padding-right: 4px;
    }

    .mistake-btn {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px;
      text-align: left;
      line-height: 1.45;
    }

    .empty {
      color: var(--muted);
      line-height: 1.65;
      margin: 0;
    }

    body {
      background:
        linear-gradient(135deg, rgba(47, 125, 98, 0.12) 0, rgba(47, 125, 98, 0) 34%),
        linear-gradient(225deg, rgba(123, 94, 46, 0.10) 0, rgba(123, 94, 46, 0) 36%),
        linear-gradient(180deg, #f3f6f5 0, #edf2f4 100%);
    }

    .topbar,
    .toolbar,
    .quiz-panel,
    .side-panel {
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .toolbar,
    .quiz-panel,
    .side-panel {
      background: rgba(255, 255, 255, 0.68);
      border-color: rgba(148, 163, 184, 0.28);
      box-shadow: 0 24px 70px rgba(31, 41, 55, 0.12);
    }

    .home-link,
    .tab,
    .mode-btn,
    .plain-btn,
    .danger-btn,
    .metric,
    .option-btn,
    .answer-box,
    .mistake-btn {
      background: rgba(248, 250, 252, 0.72);
      border-color: rgba(148, 163, 184, 0.28);
    }

    .primary-btn,
    .tab.active,
    .mode-btn.active,
    .plain-btn.active {
      background: #22313f;
      border-color: #22313f;
      color: #fff;
    }

    .prompt {
      color: #1f2937;
    }

    .feedback {
      background: rgba(248, 250, 252, 0.66);
      border-color: rgba(148, 163, 184, 0.28);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --panel: rgba(23, 31, 45, 0.72);
        --ink: #e5e7eb;
        --muted: #a8b3c4;
        --line: rgba(148, 163, 184, 0.22);
      }

      body {
        background:
          linear-gradient(135deg, rgba(94, 151, 134, 0.13) 0, rgba(94, 151, 134, 0) 34%),
          linear-gradient(225deg, rgba(150, 132, 93, 0.11) 0, rgba(150, 132, 93, 0) 36%),
          linear-gradient(180deg, #111827 0, #0f172a 100%);
      }

      .toolbar,
      .quiz-panel,
      .side-panel,
      .home-link,
      .tab,
      .mode-btn,
      .plain-btn,
      .danger-btn,
      .metric,
      .option-btn,
      .answer-box,
      .mistake-btn {
        background: rgba(23, 31, 45, 0.72);
        border-color: rgba(148, 163, 184, 0.22);
        color: var(--ink);
      }

      .prompt,
      .feedback .answer {
        color: var(--ink);
      }

      .feedback {
        background: rgba(15, 23, 42, 0.64);
      }
    }

    :root {
      color-scheme: light;
    }

    body,
    .toolbar,
    .quiz-panel,
    .side-panel,
    .home-link,
    .tab,
    .mode-btn,
    .plain-btn,
    .danger-btn,
    .metric,
    .option-btn,
    .answer-box,
    .mistake-btn {
      color: #1f2937;
    }

    body {
      background:
        linear-gradient(135deg, rgba(47, 125, 98, 0.12) 0, rgba(47, 125, 98, 0) 34%),
        linear-gradient(225deg, rgba(123, 94, 46, 0.10) 0, rgba(123, 94, 46, 0) 36%),
        linear-gradient(180deg, #f3f6f5 0, #edf2f4 100%);
    }

    .toolbar,
    .quiz-panel,
    .side-panel {
      background: rgba(255, 255, 255, 0.68);
      border-color: rgba(148, 163, 184, 0.28);
      box-shadow: 0 24px 70px rgba(31, 41, 55, 0.12);
    }

    .home-link,
    .tab,
    .mode-btn,
    .plain-btn,
    .danger-btn,
    .metric,
    .option-btn,
    .mistake-btn {
      background: rgba(248, 250, 252, 0.72);
      border-color: rgba(148, 163, 184, 0.28);
    }

    .primary-btn,
    .tab.active,
    .mode-btn.active,
    .plain-btn.active {
      background: #22313f;
      border-color: #22313f;
      color: #fff;
    }

    .answer-box {
      background: rgba(255, 255, 255, 0.86);
      caret-color: #22313f;
    }

    .answer-box::placeholder {
      color: #7b8794;
    }

    .feedback .answer {
      color: #1f2937;
    }

    /* Readable fixed light theme for the quiz surface. */
    :root {
      color-scheme: light;
      --bg: #f4f7f6;
      --panel: #ffffff;
      --panel-2: #eef8f3;
      --ink: #1f2937;
      --muted: #526173;
      --line: #cfd9e3;
      --accent: #2f7d62;
      --accent-2: #7b5e2e;
      --good: #166534;
      --bad: #991b1b;
      --shadow: 0 18px 45px rgba(31, 41, 55, 0.10);
    }

    body {
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(47, 125, 98, 0.09) 0, rgba(47, 125, 98, 0) 34%),
        linear-gradient(225deg, rgba(123, 94, 46, 0.07) 0, rgba(123, 94, 46, 0) 36%),
        linear-gradient(180deg, #f5f8f7 0, #edf2f4 100%);
    }

    .brand h1,
    .prompt,
    .mini-title,
    .metric strong,
    .feedback .answer {
      color: var(--ink);
    }

    .brand p,
    .counter,
    .metric span,
    .empty {
      color: var(--muted);
    }

    .toolbar,
    .quiz-panel,
    .side-panel {
      background: rgba(255, 255, 255, 0.86);
      border-color: rgba(148, 163, 184, 0.36);
      box-shadow: var(--shadow);
    }

    .home-link,
    .tab,
    .mode-btn,
    .plain-btn,
    .danger-btn,
    .metric,
    .option-btn,
    .mistake-btn,
    .kbd {
      background: rgba(248, 250, 252, 0.94);
      color: var(--ink);
      border-color: rgba(148, 163, 184, 0.38);
    }

    .home-link:hover,
    .tab:hover,
    .mode-btn:hover,
    .plain-btn:hover,
    .danger-btn:hover,
    .option-btn:hover,
    .mistake-btn:hover {
      border-color: rgba(47, 125, 98, 0.45);
      background: #ffffff;
    }

    .tab.active,
    .mode-btn.active,
    .plain-btn.active,
    .primary-btn {
      background: #22313f;
      border-color: #22313f;
      color: #ffffff;
    }

    .danger-btn {
      color: var(--bad);
      background: #fff7f7;
      border-color: rgba(153, 27, 27, 0.26);
    }

    .primary-btn:disabled,
    .plain-btn:disabled,
    .danger-btn:disabled {
      opacity: 0.58;
      cursor: not-allowed;
      transform: none;
    }

    .badge {
      background: #eef8f3;
      color: var(--accent);
      border-color: rgba(47, 125, 98, 0.24);
    }

    .badge.source {
      background: #f7f1e7;
      color: var(--accent-2);
      border-color: rgba(123, 94, 46, 0.24);
    }

    .option-btn .letter {
      background: #e8eef5;
      color: var(--ink);
    }

    .option-btn.selected {
      background: #eef8f3;
      border-color: rgba(47, 125, 98, 0.55);
    }

    .option-btn.correct {
      background: #eefaf4;
      border-color: rgba(34, 197, 94, 0.48);
      color: #14532d;
    }

    .option-btn.wrong {
      background: #fff1f2;
      border-color: rgba(244, 63, 94, 0.46);
      color: var(--bad);
    }

    .answer-box {
      background: #ffffff;
      color: var(--ink);
      border-color: rgba(148, 163, 184, 0.44);
      caret-color: var(--ink);
    }

    .answer-box::placeholder {
      color: #7b8794;
    }

    .feedback {
      background: rgba(248, 250, 252, 0.95);
      color: #475569;
      border-color: rgba(148, 163, 184, 0.38);
    }

    .feedback.good {
      background: #eefaf4;
      color: var(--good);
      border-color: rgba(34, 197, 94, 0.38);
    }

    .feedback.bad {
      background: #fff1f2;
      color: var(--bad);
      border-color: rgba(244, 63, 94, 0.38);
    }

    .progress-shell {
      background: #dbe4ee;
    }

    @media (max-width: 860px) {
      .topbar,
      .toolbar,
      .grid {
        grid-template-columns: 1fr;
      }

      .topbar { align-items: stretch; }
      .home-link { width: fit-content; }
      .toolbar, .grid { display: grid; }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 18px, 1120px);
        padding-top: 14px;
      }

      .toolbar,
      .question-head,
      .question-body,
      .actions,
      .side-panel {
        padding-left: 12px;
        padding-right: 12px;
      }

      .question-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .tab,
      .mode-btn,
      .plain-btn,
      .primary-btn,
      .danger-btn {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>OS 背记刷题</h1>
        <p>期中覆盖启动、内存、进程线程与同步互斥；期末不含启动，4.2 调度仅在期末模式出现</p>
      </div>
      <a class="home-link" href="/">返回博客</a>
    </header>

    <section class="toolbar" aria-label="刷题控制">
      <div class="mode-switch" id="examTabs">
        <button class="mode-btn active" type="button" data-exam="mid">期中</button>
        <button class="mode-btn" type="button" data-exam="final">期末</button>
      </div>
      <div class="tabs" id="typeTabs"></div>
      <div class="mode-switch" id="orderTabs">
        <button class="mode-btn active" type="button" data-order="sequential">顺序</button>
        <button class="mode-btn" type="button" data-order="random">随机</button>
      </div>
      <button class="danger-btn" type="button" id="resetBtn">清空记录</button>
    </section>

    <section class="grid">
      <article class="quiz-panel">
        <div class="question-head">
          <div class="badge-row">
            <span class="badge" id="typeBadge"></span>
            <span class="badge source" id="sourceBadge"></span>
          </div>
          <span class="counter" id="counter"></span>
        </div>
        <div class="question-body">
          <p class="prompt" id="prompt"></p>
          <div id="answerArea"></div>
          <div class="feedback" id="feedback"></div>
        </div>
        <div class="actions">
          <button class="plain-btn" type="button" id="prevBtn">上一题</button>
          <button class="primary-btn" type="button" id="checkBtn">判题</button>
          <button class="plain-btn" type="button" id="answerBtn">看答案</button>
          <button class="primary-btn" type="button" id="nextBtn">下一题</button>
        </div>
      </article>

      <aside class="side-panel">
        <div class="metric-grid">
          <div class="metric"><strong id="doneCount">0</strong><span>已做</span></div>
          <div class="metric"><strong id="rightRate">0%</strong><span>正确率</span></div>
          <div class="metric"><strong id="totalCount">0</strong><span>当前题量</span></div>
          <div class="metric"><strong id="mistakeCount">0</strong><span>错题</span></div>
        </div>
        <div class="progress-shell" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
        <button class="plain-btn" type="button" id="mistakeModeBtn">只刷错题</button>
        <h2 class="mini-title">错题本</h2>
        <div class="mistakes" id="mistakes"></div>
      </aside>
    </section>
  </main>

  <script>
    const QUESTION_BANK = [
      {
            "id": "style_mid_fifo_opt",
            "scope": "mid",
            "type": "essay",
            "source": "期中风格题",
            "prompt": "某进程访问页号序列 1,2,3,1,4,1,2,5，分配 3 个空页框。分别写出 FIFO 和 OPT 的缺页次数。",
            "answer": "FIFO 缺页 6 次，OPT 缺页 5 次。FIFO 依先入先出淘汰，OPT 淘汰未来最长时间不用的页面。",
            "aliases": [
                  "FIFO6 OPT5 先入先出 最优置换 未来最长不用"
            ]
      },
      {
            "id": "style_mid_pv_buffer1",
            "scope": "mid",
            "type": "essay",
            "source": "期中风格题",
            "prompt": "用不超过两个信号量，为容量为 1、初始为空的缓冲区写出生产者-消费者同步互斥思路。",
            "answer": "可设 empty=1、full=0。生产者执行 P(empty)、放入产品、V(full)；消费者执行 P(full)、取走产品、V(empty)。容量为 1 时 empty/full 同时保证同步和互斥。",
            "aliases": [
                  "empty=1 full=0 生产者P(empty)V(full) 消费者P(full)V(empty) 容量1 同步互斥"
            ]
      },
      {
            "id": "style_mid_context_io",
            "scope": "mid",
            "type": "essay",
            "source": "期中风格题",
            "prompt": "进程执行 read() 后等待慢速 I/O，请写出特权级变化、进程状态变化和设备完成后的中断处理要点。",
            "answer": "read 系统调用使 CPU 从用户态陷入内核态；若数据未就绪，进程从运行态转为阻塞态，操作系统调度其他就绪进程运行；设备完成后发出硬件中断，CPU 保存现场进入中断处理程序，驱动确认设备状态并唤醒等待进程，使其进入就绪队列，之后由调度器选择运行。",
            "aliases": [
                  "用户态 内核态 运行态 阻塞态 就绪队列 硬件中断 保存现场 中断处理 驱动 唤醒 调度"
            ]
      },
      {

    function pushPointQuestions(point) {
      const source = point.source || "知识点";
      const scope = point.scope || "final";
      if (point.kind === "fact") {
        return [
          { id: `${point.id}_fill`, scope, type: "fill", source, prompt: point.fillPrompt, answers: point.fillAnswers },
          { id: `${point.id}_choice`, scope, type: "choice", source, prompt: `下列关于${point.topic}的说法正确的是（ ）。`, answer: "A", options: { A: point.judgeTrue, B: point.judgeFalse, C: `${point.topic}与操作系统资源管理无关。`, D: `${point.topic}只影响应用程序界面，不影响系统运行。` } },
          { id: `${point.id}_judge_t`, scope, type: "judge", source, prompt: point.judgeTrue, answer: "对" },
          { id: `${point.id}_judge_f`, scope, type: "judge", source, prompt: point.judgeFalse, answer: "错" },
          { id: `${point.id}_short`, scope, type: "short", source, prompt: `简述${point.topic}。`, answer: point.shortAnswer, aliases: [point.shortAnswer] }
        ];
      }
      if (point.kind === "list") {
        const fillPrompt = point.fillPrompt || `${point.topic}包括__________。`;
        const blankCount = (fillPrompt.match(/_{3,}/g) || []).length;
        const fillAnswers = point.fillAnswers || (blankCount ? point.items.slice(0, blankCount) : point.items);
        const trueText = `${point.topic}包括${point.items.join("、")}。`;
        const falseText = `${point.topic}包括${(point.wrongs && point.wrongs[0]) || "无关内容"}。`;
        const choiceOptions = {
          A: point.items[0],
          B: (point.wrongs && point.wrongs[0]) || "无关内容一",
          C: (point.wrongs && point.wrongs[1]) || "无关内容二",
          D: (point.wrongs && point.wrongs[2]) || "无关内容三"
        };
        const questions = [
          { id: `${point.id}_judge_t`, scope, type: "judge", source, prompt: trueText, answer: "对" },
          { id: `${point.id}_judge_f`, scope, type: "judge", source, prompt: falseText, answer: "错" },
          { id: `${point.id}_choice`, scope, type: "choice", source, prompt: `下列属于${point.topic}的是（ ）。`, answer: "A", options: choiceOptions },
          { id: `${point.id}_short`, scope, type: "short", source, prompt: `简述${point.topic}。`, answer: point.shortAnswer, aliases: [point.shortAnswer] }
        ];
        if (fillPrompt && fillAnswers.length) {
          questions.unshift({ id: `${point.id}_fill`, scope, type: "fill", source, prompt: fillPrompt, answers: fillAnswers });
        }
        return questions;
      }
      if (point.kind === "essay") {
        return [
          { id: `${point.id}_essay`, scope, type: "essay", source, prompt: `结合知识点，论述${point.topic}。`, answer: point.answer, aliases: point.aliases || [] }
        ];
      }
      return [];
    }

    KNOWLEDGE_POINTS.forEach((point) => {
      QUESTION_BANK.push(...pushPointQuestions(point));
    });

    const TYPE_LABEL = {
      all: "全部",
      fill: "填空",
      choice: "选择",
      judge: "判断",
      short: "简答",
      essay: "论述",
      mistakes: "错题"
    };

    const STORE_KEY = "os-quiz-state-v1";
    const $ = (id) => document.getElementById(id);

    let state = {
      exam: "mid",
      filter: "all",
      order: "sequential",
      index: 0,
      input: "",
      answered: {},
      mistakes: {}
    };

    let queue = [];
    let queueKey = "";

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
        state = { ...state, ...saved };
        if (!["mid", "final"].includes(state.exam)) state.exam = "mid";
        if (!["sequential", "random"].includes(state.order)) state.order = "sequential";
        if (!Object.keys(TYPE_LABEL).includes(state.filter)) state.filter = "all";
      } catch (_) {
        saveState();
      }
    }

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function isStartupQuestion(q) {
      return String(q.source || "").startsWith("2 启动");
    }

    function scopedQuestions() {
      return QUESTION_BANK.filter((q) => {
        if (state.exam === "mid") return q.scope === "mid";
        return !isStartupQuestion(q);
      });
    }

    function buildQueue(keepCurrentId, force = false) {
      let items = scopedQuestions();
      if (state.filter === "mistakes") {
        items = items.filter((q) => state.mistakes[q.id]);
      } else if (state.filter !== "all") {
        items = items.filter((q) => q.type === state.filter);
      }
      const nextKey = `${state.exam}|${state.filter}|${state.order}|${items.map((q) => q.id).join("|")}`;
      if (!force && queueKey === nextKey && queue.length) {
        if (keepCurrentId) {
          const found = queue.findIndex((q) => q.id === keepCurrentId);
          state.index = found >= 0 ? found : 0;
        } else if (state.index >= queue.length) {
          state.index = 0;
        }
        return;
      }
      queueKey = nextKey;
      queue = state.order === "random" ? shuffle(items) : [...items];
      if (keepCurrentId) {
        const found = queue.findIndex((q) => q.id === keepCurrentId);
        state.index = found >= 0 ? found : 0;
      } else if (state.index >= queue.length) {
        state.index = 0;
      }
    }

    function normalizeExact(text) {
      return String(text || "")
        .trim()
        .toLowerCase()
        .replace(/[，。、“”‘’；;：:,.!?！？（）()\[\]【】《》<>]/g, "")
        .replace(/\s+/g, "");
    }

    function normalizeSimilarity(text) {
      return normalizeExact(text).replace(/[的地得]/g, "");
    }

    function splitFill(text) {
      return String(text || "")
        .trim()
        .split(/[\s,，;；、/|]+/)
        .filter(Boolean);
    }

    function answerText(q) {
      if (q.type === "fill") return q.answers.join(" ");
      return q.answer;
    }

    function levenshtein(a, b) {
      if (a === b) return 0;
      if (!a.length) return b.length;
      if (!b.length) return a.length;
      let prev = Array.from({ length: b.length + 1 }, (_, i) => i);
      let curr = new Array(b.length + 1);
      for (let i = 1; i <= a.length; i += 1) {
        curr[0] = i;
        for (let j = 1; j <= b.length; j += 1) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          curr[j] = Math.min(curr[j - 1] + 1, prev[j] + 1, prev[j - 1] + cost);
        }
        [prev, curr] = [curr, prev];
      }
      return prev[b.length];
    }

    function similarity(user, refs) {
      const source = normalizeSimilarity(user);
      if (!source) return 0;
      return refs.reduce((best, ref) => {
        const target = normalizeSimilarity(ref);
        const distance = levenshtein(source, target);
        const score = 1 - distance / Math.max(source.length, target.length, 1);
        return Math.max(best, score);
      }, 0);
    }

    function grade(q, value) {
      if (q.type === "choice" || q.type === "judge") {
        return { correct: value === q.answer, detail: "" };
      }
      if (q.type === "fill") {
        const parts = splitFill(value);
        const byParts = parts.length === q.answers.length && q.answers.every((ans, i) => normalizeExact(ans) === normalizeExact(parts[i]));
        const byWhole = normalizeExact(value) === q.answers.map(normalizeExact).join("");
        return { correct: byParts || byWhole, detail: "" };
      }
      const score = similarity(value, [q.answer, ...(q.aliases || [])]);
      return { correct: score >= 0.85, detail: `相似度 ${Math.round(score * 100)}%` };
    }

    function markAnswered(q, value, result) {
      state.answered[q.id] = { value, correct: result.correct, at: Date.now(), detail: result.detail || "" };
      if (result.correct) {
        delete state.mistakes[q.id];
      } else {
        state.mistakes[q.id] = true;
      }
      saveState();
    }

    function escapeHtml(text) {
      return String(text || "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[ch]);
    }

    function setFeedback(result, q) {
      const feedback = $("feedback");
      feedback.className = `feedback ${result.correct ? "good" : "bad"}`;
      feedback.innerHTML = `${result.correct ? "判定正确" : "判定错误"}${result.detail ? "，" + result.detail : ""}<span class="answer">参考答案：${escapeHtml(answerText(q))}</span>`;
    }

    function currentQuestion() {
      return queue[state.index];
    }

    function renderTabs() {
      $("typeTabs").innerHTML = Object.keys(TYPE_LABEL).map((type) => (
        `<button class="tab ${state.filter === type ? "active" : ""}" type="button" data-type="${type}">${TYPE_LABEL[type]}</button>`
      )).join("");
    }

    function renderAnswerArea(q) {
      const saved = state.answered[q.id];
      const savedValue = saved ? saved.value : "";
      if (q.type === "choice") {
        $("checkBtn").style.display = "none";
        $("answerArea").innerHTML = `<div class="options">${Object.entries(q.options).map(([key, text]) => (
          `<button class="option-btn ${savedValue === key ? "selected" : ""}" type="button" data-value="${key}">
            <span class="letter">${key}</span><span>${escapeHtml(text)}</span>
          </button>`
        )).join("")}</div>`;
        return;
      }
      if (q.type === "judge") {
        $("checkBtn").style.display = "none";
        $("answerArea").innerHTML = `<div class="options">
          <button class="option-btn ${savedValue === "对" ? "selected" : ""}" type="button" data-value="对"><span class="letter">对</span><span>正确</span></button>
          <button class="option-btn ${savedValue === "错" ? "selected" : ""}" type="button" data-value="错"><span class="letter">错</span><span>错误</span></button>
        </div>`;
        return;
      }
      $("checkBtn").style.display = "";
      const tag = q.type === "fill" ? "input" : "textarea";
      const placeholder = q.type === "fill" ? "多空答案用空格隔开" : "按要点作答，相似度达到 85% 判对";
      $("answerArea").innerHTML = tag === "input"
        ? `<input class="answer-box" id="textAnswer" value="${escapeHtml(savedValue)}" placeholder="${placeholder}">`
        : `<textarea class="answer-box" id="textAnswer" placeholder="${placeholder}">${escapeHtml(savedValue)}</textarea>`;
    }

    function renderMistakes() {
      const scoped = scopedQuestions();
      const mistakeIds = Object.keys(state.mistakes).filter((id) => scoped.some((q) => q.id === id));
      $("mistakeCount").textContent = String(mistakeIds.length);
      if (!mistakeIds.length) {
        $("mistakes").innerHTML = `<p class="empty">还没有错题。</p>`;
        return;
      }
      $("mistakes").innerHTML = mistakeIds.slice(0, 24).map((id) => {
        const q = QUESTION_BANK.find((item) => item.id === id);
        if (!q) return "";
        return `<button class="mistake-btn" type="button" data-id="${q.id}"><strong>${TYPE_LABEL[q.type]}</strong> ${escapeHtml(q.prompt).slice(0, 56)}</button>`;
      }).join("");
    }

    function renderStats() {
      const scoped = scopedQuestions();
      const scopedIds = new Set(scoped.map((q) => q.id));
      const answered = Object.entries(state.answered).filter(([id]) => scopedIds.has(id)).map(([, item]) => item);
      const right = answered.filter((item) => item.correct).length;
      $("doneCount").textContent = String(answered.length);
      $("rightRate").textContent = answered.length ? `${Math.round(right / answered.length * 100)}%` : "0%";
      $("totalCount").textContent = String(queue.length);
      $("progressBar").style.width = scoped.length ? `${Math.min(100, answered.length / scoped.length * 100)}%` : "0";
      renderMistakes();
    }

    function renderQuestion() {
      renderTabs();
      syncModeButtons();
      buildQueue();
      const q = currentQuestion();
      renderStats();
      if (!q) {
        $("typeBadge").textContent = TYPE_LABEL[state.filter] || "题目";
        $("sourceBadge").textContent = "无题目";
        $("counter").textContent = "0 / 0";
        $("prompt").textContent = "当前分类没有题目。";
        $("answerArea").innerHTML = "";
        $("feedback").className = "feedback";
        $("feedback").textContent = "换一个题型或清空错题后再试。";
        return;
      }
      $("typeBadge").textContent = TYPE_LABEL[q.type];
      $("sourceBadge").textContent = q.source;
      $("counter").textContent = `${state.index + 1} / ${queue.length}`;
      $("prompt").textContent = q.prompt;
      renderAnswerArea(q);
      const saved = state.answered[q.id];
      if (saved) {
        setFeedback({ correct: saved.correct, detail: saved.detail }, q);
      } else {
        $("feedback").className = "feedback";
        $("feedback").textContent = q.type === "fill" ? "填空题多空请用空格隔开。" : "选择、判断会自动判题；简答和论述按参考答案相似度判定。";
      }
      document.querySelectorAll(".option-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const value = btn.dataset.value;
          const result = grade(q, value);
          markAnswered(q, value, result);
          renderQuestion();
          document.querySelectorAll(".option-btn").forEach((option) => {
            if (option.dataset.value === q.answer) option.classList.add("correct");
            if (option.dataset.value === value && !result.correct) option.classList.add("wrong");
          });
        });
      });
    }

    function checkCurrent() {
      const q = currentQuestion();
      if (!q) return;
      let value = "";
      if (q.type === "choice" || q.type === "judge") {
        const selected = document.querySelector(".option-btn.selected");
        value = selected ? selected.dataset.value : "";
      } else {
        value = $("textAnswer").value;
      }
      const result = grade(q, value);
      markAnswered(q, value, result);
      setFeedback(result, q);
      renderStats();
    }

    function move(delta) {
      if (!queue.length) return;
      state.index = (state.index + delta + queue.length) % queue.length;
      saveState();
      renderQuestion();
    }

    function bindEvents() {
      $("examTabs").addEventListener("click", (event) => {
        const btn = event.target.closest("[data-exam]");
        if (!btn) return;
        state.exam = btn.dataset.exam;
        state.index = 0;
        queueKey = "";
        saveState();
        syncModeButtons();
        renderQuestion();
      });
      $("typeTabs").addEventListener("click", (event) => {
        const btn = event.target.closest("[data-type]");
        if (!btn) return;
        state.filter = btn.dataset.type;
        state.index = 0;
        queueKey = "";
        saveState();
        renderQuestion();
      });
      $("orderTabs").addEventListener("click", (event) => {
        const btn = event.target.closest("[data-order]");
        if (!btn) return;
        state.order = btn.dataset.order;
        syncModeButtons();
        state.index = 0;
        queueKey = "";
        saveState();
        renderQuestion();
      });
      $("prevBtn").addEventListener("click", () => move(-1));
      $("nextBtn").addEventListener("click", () => move(1));
      $("checkBtn").addEventListener("click", checkCurrent);
      $("answerBtn").addEventListener("click", () => {
        const q = currentQuestion();
        if (!q) return;
        $("feedback").className = "feedback";
        $("feedback").innerHTML = `参考答案：<span class="answer">${escapeHtml(answerText(q))}</span>`;
      });
      $("resetBtn").addEventListener("click", () => {
        if (!confirm("确认清空刷题记录和错题本？")) return;
        state.answered = {};
        state.mistakes = {};
        state.index = 0;
        queueKey = "";
        saveState();
        renderQuestion();
      });
      $("mistakeModeBtn").addEventListener("click", () => {
        state.filter = state.filter === "mistakes" ? "all" : "mistakes";
        state.index = 0;
        queueKey = "";
        saveState();
        renderQuestion();
      });
      $("mistakes").addEventListener("click", (event) => {
        const btn = event.target.closest("[data-id]");
        if (!btn) return;
        state.filter = "all";
        queueKey = "";
        buildQueue(btn.dataset.id, true);
        saveState();
        renderQuestion();
      });
    }

    function syncModeButtons() {
      document.querySelectorAll("#examTabs .mode-btn").forEach((item) => item.classList.toggle("active", item.dataset.exam === state.exam));
      document.querySelectorAll("#orderTabs .mode-btn").forEach((item) => item.classList.toggle("active", item.dataset.order === state.order));
      $("mistakeModeBtn").classList.toggle("active", state.filter === "mistakes");
    }

    loadState();
    syncModeButtons();
    buildQueue();
    bindEvents();
    renderQuestion();
  </script>
  <script src="/js/quiz-ai.js"></script>
</body>
</html>
