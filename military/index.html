<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>军理背记刷题</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-2: #eef6f8;
      --ink: #132238;
      --muted: #64748b;
      --line: #d9e2ec;
      --accent: #1f7a8c;
      --accent-2: #315f9d;
      --good: #1f8a5b;
      --bad: #c2413b;
      --warn: #a86b14;
      --shadow: 0 18px 45px rgba(19, 34, 56, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #eef6f8 0, var(--bg) 360px);
      letter-spacing: 0;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(26px, 5vw, 44px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .home-link {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.8);
      text-decoration: none;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .tabs,
    .mode-switch {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tab,
    .mode-btn,
    .plain-btn,
    .primary-btn,
    .danger-btn {
      min-height: 38px;
      padding: 0 13px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .tab:hover,
    .mode-btn:hover,
    .plain-btn:hover,
    .primary-btn:hover,
    .danger-btn:hover {
      transform: translateY(-1px);
    }

    .tab.active,
    .mode-btn.active,
    .plain-btn.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .primary-btn {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .danger-btn {
      color: var(--bad);
      border-color: rgba(194, 65, 59, 0.35);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 16px;
      align-items: start;
    }

    .quiz-panel,
    .side-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .quiz-panel {
      min-height: 560px;
      display: flex;
      flex-direction: column;
    }

    .question-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--line);
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 13px;
      background: var(--panel-2);
      color: var(--accent);
      border: 1px solid rgba(31, 122, 140, 0.18);
    }

    .badge.source {
      color: var(--accent-2);
      background: #eef3fb;
      border-color: rgba(49, 95, 157, 0.18);
    }

    .counter {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .question-body {
      padding: 22px 20px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .prompt {
      margin: 0 0 18px;
      font-size: clamp(20px, 3.2vw, 26px);
      line-height: 1.55;
      font-weight: 700;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .option-btn {
      width: 100%;
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-height: 54px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      text-align: left;
    }

    .option-btn .letter {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #edf2f7;
      font-weight: 700;
    }

    .option-btn.selected {
      border-color: var(--accent);
      background: #f1fbfc;
    }

    .option-btn.correct {
      border-color: rgba(31, 138, 91, 0.6);
      background: #eefaf4;
    }

    .option-btn.wrong {
      border-color: rgba(194, 65, 59, 0.55);
      background: #fff1f1;
    }

    .answer-box {
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--ink);
      background: #fff;
      resize: vertical;
      outline: none;
    }

    .answer-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 122, 140, 0.12);
    }

    textarea.answer-box {
      min-height: 150px;
      line-height: 1.7;
    }

    .feedback {
      min-height: 74px;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px dashed var(--line);
      background: #f8fafc;
      color: var(--muted);
      line-height: 1.65;
    }

    .feedback.good {
      color: var(--good);
      border-color: rgba(31, 138, 91, 0.35);
      background: #f0fbf6;
    }

    .feedback.bad {
      color: var(--bad);
      border-color: rgba(194, 65, 59, 0.35);
      background: #fff5f4;
    }

    .feedback .answer {
      display: block;
      margin-top: 6px;
      color: var(--ink);
      word-break: break-word;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 20px;
    }

    .side-panel {
      padding: 16px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .metric strong {
      display: block;
      font-size: 24px;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    .metric span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .progress-shell {
      height: 10px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
      margin: 8px 0 18px;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--good));
      transition: width 0.2s ease;
    }

    .mini-title {
      margin: 16px 0 8px;
      font-size: 15px;
      color: var(--ink);
    }

    .mistakes {
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
      padding-right: 4px;
    }

    .mistake-btn {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px;
      text-align: left;
      line-height: 1.45;
    }

    .empty {
      color: var(--muted);
      line-height: 1.65;
      margin: 0;
    }

    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 24px;
      padding: 0 7px;
      border: 1px solid var(--line);
      border-bottom-width: 2px;
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
    }

    body {
      background:
        linear-gradient(135deg, rgba(31, 122, 140, 0.12) 0, rgba(31, 122, 140, 0) 34%),
        linear-gradient(225deg, rgba(49, 95, 157, 0.10) 0, rgba(49, 95, 157, 0) 36%),
        linear-gradient(180deg, #f2f6f8 0, #edf2f5 100%);
    }

    .topbar,
    .toolbar,
    .quiz-panel,
    .side-panel {
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .toolbar,
    .quiz-panel,
    .side-panel {
      background: rgba(255, 255, 255, 0.68);
      border-color: rgba(148, 163, 184, 0.28);
      box-shadow: 0 24px 70px rgba(31, 41, 55, 0.12);
    }

    .home-link,
    .tab,
    .mode-btn,
    .plain-btn,
    .danger-btn,
    .metric,
    .option-btn,
    .answer-box,
    .mistake-btn {
      background: rgba(248, 250, 252, 0.72);
      border-color: rgba(148, 163, 184, 0.28);
    }

    .primary-btn,
    .tab.active,
    .mode-btn.active,
    .plain-btn.active {
      background: #22313f;
      border-color: #22313f;
      color: #fff;
    }

    .prompt {
      color: #1f2937;
    }

    .feedback {
      background: rgba(248, 250, 252, 0.66);
      border-color: rgba(148, 163, 184, 0.28);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --panel: rgba(23, 31, 45, 0.72);
        --ink: #e5e7eb;
        --muted: #a8b3c4;
        --line: rgba(148, 163, 184, 0.22);
      }

      body {
        background:
          linear-gradient(135deg, rgba(92, 165, 178, 0.13) 0, rgba(92, 165, 178, 0) 34%),
          linear-gradient(225deg, rgba(112, 139, 187, 0.11) 0, rgba(112, 139, 187, 0) 36%),
          linear-gradient(180deg, #111827 0, #0f172a 100%);
      }

      .toolbar,
      .quiz-panel,
      .side-panel,
      .home-link,
      .tab,
      .mode-btn,
      .plain-btn,
      .danger-btn,
      .metric,
      .option-btn,
      .answer-box,
      .mistake-btn {
        background: rgba(23, 31, 45, 0.72);
        border-color: rgba(148, 163, 184, 0.22);
        color: var(--ink);
      }

      .prompt,
      .feedback .answer {
        color: var(--ink);
      }

      .feedback {
        background: rgba(15, 23, 42, 0.64);
      }
    }

    :root {
      color-scheme: light;
    }

    body,
    .toolbar,
    .quiz-panel,
    .side-panel,
    .home-link,
    .tab,
    .mode-btn,
    .plain-btn,
    .danger-btn,
    .metric,
    .option-btn,
    .answer-box,
    .mistake-btn {
      color: #1f2937;
    }

    body {
      background:
        linear-gradient(135deg, rgba(31, 122, 140, 0.12) 0, rgba(31, 122, 140, 0) 34%),
        linear-gradient(225deg, rgba(49, 95, 157, 0.10) 0, rgba(49, 95, 157, 0) 36%),
        linear-gradient(180deg, #f2f6f8 0, #edf2f5 100%);
    }

    .toolbar,
    .quiz-panel,
    .side-panel {
      background: rgba(255, 255, 255, 0.68);
      border-color: rgba(148, 163, 184, 0.28);
      box-shadow: 0 24px 70px rgba(31, 41, 55, 0.12);
    }

    .home-link,
    .tab,
    .mode-btn,
    .plain-btn,
    .danger-btn,
    .metric,
    .option-btn,
    .mistake-btn {
      background: rgba(248, 250, 252, 0.72);
      border-color: rgba(148, 163, 184, 0.28);
    }

    .primary-btn,
    .tab.active,
    .mode-btn.active,
    .plain-btn.active {
      background: #22313f;
      border-color: #22313f;
      color: #fff;
    }

    .answer-box {
      background: rgba(255, 255, 255, 0.86);
      caret-color: #22313f;
    }

    .answer-box::placeholder {
      color: #7b8794;
    }

    .feedback .answer {
      color: #1f2937;
    }

    /* Readable fixed light theme for the quiz surface. */
    :root {
      color-scheme: light;
      --bg: #f4f7f8;
      --panel: #ffffff;
      --panel-2: #edf7f7;
      --ink: #1f2937;
      --muted: #526173;
      --line: #cfd9e3;
      --accent: #1f7a8c;
      --accent-2: #315f9d;
      --good: #166534;
      --bad: #991b1b;
      --shadow: 0 18px 45px rgba(31, 41, 55, 0.10);
    }

    body {
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(31, 122, 140, 0.09) 0, rgba(31, 122, 140, 0) 34%),
        linear-gradient(225deg, rgba(49, 95, 157, 0.08) 0, rgba(49, 95, 157, 0) 36%),
        linear-gradient(180deg, #f5f8fa 0, #edf2f5 100%);
    }

    .brand h1,
    .prompt,
    .mini-title,
    .metric strong,
    .feedback .answer {
      color: var(--ink);
    }

    .brand p,
    .counter,
    .metric span,
    .empty {
      color: var(--muted);
    }

    .toolbar,
    .quiz-panel,
    .side-panel {
      background: rgba(255, 255, 255, 0.86);
      border-color: rgba(148, 163, 184, 0.36);
      box-shadow: var(--shadow);
    }

    .home-link,
    .tab,
    .mode-btn,
    .plain-btn,
    .danger-btn,
    .metric,
    .option-btn,
    .mistake-btn,
    .kbd {
      background: rgba(248, 250, 252, 0.94);
      color: var(--ink);
      border-color: rgba(148, 163, 184, 0.38);
    }

    .home-link:hover,
    .tab:hover,
    .mode-btn:hover,
    .plain-btn:hover,
    .danger-btn:hover,
    .option-btn:hover,
    .mistake-btn:hover {
      border-color: rgba(31, 122, 140, 0.45);
      background: #ffffff;
    }

    .tab.active,
    .mode-btn.active,
    .plain-btn.active,
    .primary-btn {
      background: #22313f;
      border-color: #22313f;
      color: #ffffff;
    }

    .danger-btn {
      color: var(--bad);
      background: #fff7f7;
      border-color: rgba(153, 27, 27, 0.26);
    }

    .primary-btn:disabled,
    .plain-btn:disabled,
    .danger-btn:disabled {
      opacity: 0.58;
      cursor: not-allowed;
      transform: none;
    }

    .badge {
      background: #edf7f7;
      color: var(--accent);
      border-color: rgba(31, 122, 140, 0.24);
    }

    .badge.source {
      background: #eef3fb;
      color: var(--accent-2);
      border-color: rgba(49, 95, 157, 0.24);
    }

    .option-btn .letter {
      background: #e8eef5;
      color: var(--ink);
    }

    .option-btn.selected {
      background: #eef8f7;
      border-color: rgba(31, 122, 140, 0.55);
    }

    .option-btn.correct {
      background: #eefaf4;
      border-color: rgba(34, 197, 94, 0.48);
      color: #14532d;
    }

    .option-btn.wrong {
      background: #fff1f2;
      border-color: rgba(244, 63, 94, 0.46);
      color: var(--bad);
    }

    .answer-box {
      background: #ffffff;
      color: var(--ink);
      border-color: rgba(148, 163, 184, 0.44);
      caret-color: var(--ink);
    }

    .answer-box::placeholder {
      color: #7b8794;
    }

    .feedback {
      background: rgba(248, 250, 252, 0.95);
      color: #475569;
      border-color: rgba(148, 163, 184, 0.38);
    }

    .feedback.good {
      background: #eefaf4;
      color: var(--good);
      border-color: rgba(34, 197, 94, 0.38);
    }

    .feedback.bad {
      background: #fff1f2;
      color: var(--bad);
      border-color: rgba(244, 63, 94, 0.38);
    }

    .progress-shell {
      background: #dbe4ee;
    }

    @media (max-width: 860px) {
      .topbar,
      .toolbar,
      .grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: stretch;
      }

      .home-link {
        width: fit-content;
      }

      .toolbar {
        display: grid;
      }

      .grid {
        display: grid;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 18px, 1120px);
        padding-top: 14px;
      }

      .toolbar,
      .question-head,
      .question-body,
      .actions,
      .side-panel {
        padding-left: 12px;
        padding-right: 12px;
      }

      .question-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .tab,
      .mode-btn,
      .plain-btn,
      .primary-btn,
      .danger-btn {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>军理背记刷题</h1>
        <p>提纲重点、模拟卷与去年回忆合并题库</p>
      </div>
      <a class="home-link" href="/">返回博客</a>
    </header>

    <section class="toolbar" aria-label="刷题控制">
      <div class="tabs" id="typeTabs"></div>
      <div class="mode-switch" id="orderTabs">
        <button class="mode-btn active" type="button" data-order="sequential">顺序</button>
        <button class="mode-btn" type="button" data-order="random">随机</button>
      </div>
      <button class="danger-btn" type="button" id="resetBtn">清空记录</button>
    </section>

    <section class="grid">
      <article class="quiz-panel">
        <div class="question-head">
          <div class="badge-row">
            <span class="badge" id="typeBadge"></span>
            <span class="badge source" id="sourceBadge"></span>
          </div>
          <span class="counter" id="counter"></span>
        </div>
        <div class="question-body">
          <p class="prompt" id="prompt"></p>
          <div id="answerArea"></div>
          <div class="feedback" id="feedback"></div>
        </div>
        <div class="actions">
          <button class="plain-btn" type="button" id="prevBtn">上一题</button>
          <button class="primary-btn" type="button" id="checkBtn">判题</button>
          <button class="plain-btn" type="button" id="answerBtn">看答案</button>
          <button class="primary-btn" type="button" id="nextBtn">下一题</button>
        </div>
      </article>

      <aside class="side-panel">
        <div class="metric-grid">
          <div class="metric"><strong id="doneCount">0</strong><span>已做</span></div>
          <div class="metric"><strong id="rightRate">0%</strong><span>正确率</span></div>
          <div class="metric"><strong id="totalCount">0</strong><span>当前题量</span></div>
          <div class="metric"><strong id="mistakeCount">0</strong><span>错题</span></div>
        </div>
        <div class="progress-shell" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
        <button class="plain-btn" type="button" id="mistakeModeBtn">只刷错题</button>
        <h2 class="mini-title">错题本</h2>
        <div class="mistakes" id="mistakes"></div>
      </aside>
    </section>
  </main>

  <script>
    const QUESTION_BANK = [
      { id: "f01", type: "fill", source: "模拟卷A", prompt: "国防的行为主体是__________，基本内容包括国防建设和__________两个方面。", answers: ["国家", "国防斗争"] },
      { id: "f02", type: "fill", source: "模拟卷A", prompt: "中国古代最早的国防始于__________朝。", answers: ["夏"] },
      { id: "f03", type: "fill", source: "模拟卷A", prompt: "中国现代国防具有政治性、防御性、人民性和__________性等鲜明特点。", answers: ["自主"] },
      { id: "f04", type: "fill", source: "模拟卷A", prompt: "中国国防历史的启示中，__________是国防巩固的根本。", answers: ["政治昌明"] },
      { id: "f05", type: "fill", source: "模拟卷A", prompt: "扩张型国防奉行霸权主义、强权政治和__________型战略。", answers: ["进攻"] },
      { id: "f06", type: "fill", source: "模拟卷A", prompt: "自卫型国防以维护国家安全、防止和抵御__________为目的。", answers: ["外敌侵略"] },

    function pushOutlineQuestions(point) {
      const source = point.source || "军理提纲";

          { id: `${point.id}_short`, type: "short", source, prompt: `简述${point.topic}。`, answer: point.shortAnswer, aliases: [point.shortAnswer] }
        ];
      }
      if (point.kind === "list") {
        const fillPrompt = point.fillPrompt || `${point.topic}包括__________。`;
        const blankCount = (fillPrompt.match(/_{3,}/g) || []).length;
        const fillAnswers = point.fillAnswers || (blankCount ? point.items.slice(0, blankCount) : point.items);
        const trueText = `${point.topic}包括${point.items.join("、")}。`;
        const falseText = `${point.topic}包括${(point.wrongs && point.wrongs[0]) || "其他内容"}。`;
        const choiceOptions = {
          A: point.items[0],

          C: (point.wrongs && point.wrongs[1]) || "无关内容二",
          D: (point.wrongs && point.wrongs[2]) || "无关内容三"
        };
        const questions = [
          { id: `${point.id}_judge_t`, type: "judge", source, prompt: trueText, answer: "对" },
          { id: `${point.id}_judge_f`, type: "judge", source, prompt: falseText, answer: "错" },
          { id: `${point.id}_choice`, type: "choice", source, prompt: `下列属于${point.topic}的是（ ）。`, answer: "A", options: choiceOptions },
          { id: `${point.id}_short`, type: "short", source, prompt: `简述${point.topic}。`, answer: point.shortAnswer, aliases: [point.shortAnswer] }
        ];
        if (!point.noFill && fillPrompt && fillAnswers.length) {
          questions.unshift({ id: `${point.id}_fill`, type: "fill", source, prompt: fillPrompt, answers: fillAnswers });
        }
        return questions;

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
        state = { ...state, ...saved };
      } catch (_) {
        saveState();

      localStorage.setItem(STORE_KEY, JSON.stringify(state));

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildQueue(keepCurrentId, force = false) {
      let items = QUESTION_BANK;
      if (state.filter === "mistakes") {
        items = QUESTION_BANK.filter((q) => state.mistakes[q.id]);
      } else if (state.filter !== "all") {
        items = QUESTION_BANK.filter((q) => q.type === state.filter);
      }
      const nextKey = `${state.filter}|${state.order}|${items.map((q) => q.id).join("|")}`;
      if (!force && queueKey === nextKey && queue.length) {
        if (keepCurrentId) {
          const found = queue.findIndex((q) => q.id === keepCurrentId);
          state.index = found >= 0 ? found : 0;
        } else if (state.index >= queue.length) {
          state.index = 0;
        }
        return;
      }
      queueKey = nextKey;
      queue = state.order === "random" ? shuffle(items) : [...items];
      if (keepCurrentId) {
        const found = queue.findIndex((q) => q.id === keepCurrentId);
        state.index = found >= 0 ? found : 0;
      } else if (state.index >= queue.length) {
        state.index = 0;
      }

    function normalizeExact(text) {
      return String(text || "")
        .trim()
        .toLowerCase()
        .replace(/[，。、“”‘’；;：:,.!?！？（）()\[\]【】《》<>]/g, "")
        .replace(/\s+/g, "");
    }

    function normalizeSimilarity(text) {
      return normalizeExact(text).replace(/[的地得]/g, "");
    }

    function splitFill(text) {
      return String(text || "")
        .trim()
        .split(/[\s,，;；、/|]+/)
        .filter(Boolean);
    }

      return q.answer;

    function levenshtein(a, b) {
      if (a === b) return 0;
      if (!a.length) return b.length;
      if (!b.length) return a.length;
      let prev = Array.from({ length: b.length + 1 }, (_, i) => i);
      let curr = new Array(b.length + 1);
      for (let i = 1; i <= a.length; i += 1) {
        curr[0] = i;
        for (let j = 1; j <= b.length; j += 1) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          curr[j] = Math.min(curr[j - 1] + 1, prev[j] + 1, prev[j - 1] + cost);
        }
        [prev, curr] = [curr, prev];
      }
      return prev[b.length];
    }

    function similarity(user, refs) {
      const source = normalizeSimilarity(user);
      if (!source) return 0;
      return refs.reduce((best, ref) => {
        const target = normalizeSimilarity(ref);
        const distance = levenshtein(source, target);
        const score = 1 - distance / Math.max(source.length, target.length, 1);
        return Math.max(best, score);
      }, 0);
    }

      if (!source) return { hit: 0, total: keyPoints.length, correct: false };
      const hit = keyPoints.reduce((count, point) => {
        const target = normalizeSimilarity(point);
        if (!target) return count;
        if (source.includes(target)) return count + 1;
        const closeEnough = similarity(user, [point]) >= 0.85;
        return count + (closeEnough ? 1 : 0);
      }, 0);
      return { hit, total: keyPoints.length, correct: hit >= minPoints };
    }

    function grade(q, value) {
      if (q.type === "choice" || q.type === "judge") {
        return { correct: value === q.answer, detail: "" };
      }
      if (q.type === "fill") {
        const parts = splitFill(value);
        const byParts = parts.length === q.answers.length && q.answers.every((ans, i) => normalizeExact(ans) === normalizeExact(parts[i]));
        const byWhole = normalizeExact(value) === q.answers.map(normalizeExact).join("");
        const correct = byParts || byWhole;
        return { correct, detail: "" };
      }
      if (q.keyPoints && q.minPoints) {
        const pointResult = gradeKeyPoints(value, q.keyPoints, q.minPoints);
        if (pointResult.correct) {
          return { correct: true, detail: `命中要点 ${pointResult.hit}/${pointResult.total}` };
        }
      }
      const score = similarity(value, [q.answer, ...(q.aliases || [])]);
      return { correct: score >= 0.85, detail: `相似度 ${Math.round(score * 100)}%` };
    }

    function markAnswered(q, value, result) {
      state.answered[q.id] = { value, correct: result.correct, at: Date.now(), detail: result.detail || "" };
      if (result.correct) {
        delete state.mistakes[q.id];
      } else {
        state.mistakes[q.id] = true;
      }
      saveState();
    }

    function setFeedback(result, q) {
      const feedback = $("feedback");
      feedback.className = `feedback ${result.correct ? "good" : "bad"}`;
      feedback.innerHTML = `${result.correct ? "判定正确" : "判定错误"}${result.detail ? "，" + result.detail : ""}<span class="answer">参考答案：${escapeHtml(answerText(q))}</span>`;
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[ch]));
    }

    function currentQuestion() {
      return queue[state.index] || null;
    }

    function renderTabs() {
      const types = ["all", "fill", "choice", "judge", "short", "essay"];
      $("typeTabs").innerHTML = types.map((type) => {
        const count = type === "all" ? QUESTION_BANK.length : QUESTION_BANK.filter((q) => q.type === type).length;
        return `<button class="tab ${state.filter === type ? "active" : ""}" type="button" data-type="${type}">${TYPE_LABEL[type]} ${count}</button>`;
      }).join("");
    }

    function renderQuestion() {
      buildQueue(currentQuestion()?.id);
      renderTabs();
      syncModeButtons();

      const q = currentQuestion();
      if (!q) {
        $("typeBadge").textContent = TYPE_LABEL[state.filter] || "题库";
        $("sourceBadge").textContent = "无题目";
        $("counter").textContent = "0 / 0";
        $("prompt").textContent = state.filter === "mistakes" ? "错题本是空的。" : "当前分类没有题目。";
        $("answerArea").innerHTML = "";
        $("feedback").className = "feedback";
        $("feedback").textContent = "换一个分类继续刷。";
        $("checkBtn").disabled = true;
        renderStats();
        return;
      }

      $("checkBtn").disabled = q.type === "choice" || q.type === "judge";
      $("typeBadge").textContent = TYPE_LABEL[q.type];
      $("sourceBadge").textContent = q.source;
      $("counter").textContent = `${state.index + 1} / ${queue.length}`;
      $("prompt").textContent = q.prompt;

      const saved = state.answered[q.id];
      $("feedback").className = "feedback";
      $("feedback").textContent = "作答后自动记录进度。";

      if (q.type === "choice") {
        $("answerArea").innerHTML = `<div class="options">${Object.entries(q.options).map(([letter, text]) => {
          const cls = saved ? (letter === q.answer ? " correct" : saved.value === letter ? " wrong" : "") : "";
          return `<button class="option-btn${cls}" type="button" data-choice="${letter}"><span class="letter">${letter}</span><span>${escapeHtml(text)}</span></button>`;
        }).join("")}</div>`;
      } else if (q.type === "judge") {
        $("answerArea").innerHTML = `<div class="options">${["对", "错"].map((text) => {
          const cls = saved ? (text === q.answer ? " correct" : saved.value === text ? " wrong" : "") : "";
          return `<button class="option-btn${cls}" type="button" data-choice="${text}"><span class="letter">${text}</span><span>${text === "对" ? "正确" : "错误"}</span></button>`;
        }).join("")}</div>`;
      } else if (q.type === "fill") {
        $("answerArea").innerHTML = `<input class="answer-box" id="answerInput" autocomplete="off" placeholder="多个空用空格分隔" value="${escapeHtml(saved?.value || "")}">`;
      } else {
        $("answerArea").innerHTML = `<textarea class="answer-box" id="answerInput" placeholder="在这里作答">${escapeHtml(saved?.value || "")}</textarea>`;
      }

      if (saved) {
        setFeedback({ correct: saved.correct, detail: saved.detail }, q);
      }
      renderStats();
    }

    function renderStats() {
      const relevantIds = new Set(queue.map((q) => q.id));
      const answered = Object.entries(state.answered).filter(([id]) => relevantIds.has(id));
      const correct = answered.filter(([, item]) => item.correct).length;
      const mistakes = QUESTION_BANK.filter((q) => state.mistakes[q.id]);
      $("doneCount").textContent = answered.length;
      $("rightRate").textContent = answered.length ? `${Math.round((correct / answered.length) * 100)}%` : "0%";
      $("totalCount").textContent = queue.length;
      $("mistakeCount").textContent = mistakes.length;
      $("progressBar").style.width = queue.length ? `${Math.round((answered.length / queue.length) * 100)}%` : "0%";
      $("mistakes").innerHTML = mistakes.length ? mistakes.map((q) => `<button class="mistake-btn" type="button" data-goto="${q.id}">${TYPE_LABEL[q.type]}：${escapeHtml(q.prompt)}</button>`).join("") : `<p class="empty">暂时没有错题。</p>`;
      $("mistakeModeBtn").classList.toggle("active", state.filter === "mistakes");
    }

    function submitValue(value) {
      const q = currentQuestion();
      if (!q) return;
      const result = grade(q, value);
      markAnswered(q, value, result);
      renderQuestion();
    }

    function move(delta) {
      if (!queue.length) return;
      state.index = (state.index + delta + queue.length) % queue.length;
      saveState();
      renderQuestion();
    }

    function gotoQuestion(id) {
      const q = QUESTION_BANK.find((item) => item.id === id);
      if (!q) return;
      state.filter = state.mistakes[id] ? "mistakes" : q.type;
      queueKey = "";
      buildQueue(id, true);
      saveState();
      renderQuestion();
    }

    function syncModeButtons() {
      document.querySelectorAll("#orderTabs .mode-btn").forEach((btn) => btn.classList.toggle("active", btn.dataset.order === state.order));
      $("mistakeModeBtn").classList.toggle("active", state.filter === "mistakes");
    }

    document.addEventListener("click", (event) => {
      const typeButton = event.target.closest("[data-type]");
      if (typeButton) {
        state.filter = typeButton.dataset.type;
        state.index = 0;
        queueKey = "";
        saveState();
        renderQuestion();
        return;
      }

      const orderButton = event.target.closest("[data-order]");
      if (orderButton) {
        state.order = orderButton.dataset.order;
        state.index = 0;
        queueKey = "";
        saveState();
        renderQuestion();
        return;
      }

      const choiceButton = event.target.closest("[data-choice]");
      if (choiceButton) {
        submitValue(choiceButton.dataset.choice);
        return;
      }

      const mistakeButton = event.target.closest("[data-goto]");
      if (mistakeButton) {
        gotoQuestion(mistakeButton.dataset.goto);
      }
    });

    $("checkBtn").addEventListener("click", () => {
      const input = $("answerInput");
      submitValue(input ? input.value : "");
    });

    $("answerBtn").addEventListener("click", () => {
      const q = currentQuestion();
      if (!q) return;
      $("feedback").className = "feedback";
      $("feedback").innerHTML = `<span class="answer">参考答案：${escapeHtml(answerText(q))}</span>`;
    });

    $("prevBtn").addEventListener("click", () => move(-1));
    $("nextBtn").addEventListener("click", () => move(1));

    $("resetBtn").addEventListener("click", () => {
      if (!confirm("清空当前刷题记录？")) return;
      state.answered = {};
      state.mistakes = {};
      state.index = 0;
      queueKey = "";
      saveState();
      renderQuestion();
    });

    $("mistakeModeBtn").addEventListener("click", () => {
      state.filter = state.filter === "mistakes" ? "all" : "mistakes";
      state.index = 0;
      queueKey = "";
      saveState();
      renderQuestion();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
        const input = $("answerInput");
        if (input) submitValue(input.value);
      }
    });

    loadState();
    buildQueue();
    renderQuestion();
  </script>
</body>
</html>
