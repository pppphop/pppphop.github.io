<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>思修背记刷题</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --soft: #eef7f2;
      --ink: #172033;
      --muted: #66758a;
      --line: #dce3eb;
      --accent: #2f7d62;
      --accent-2: #7b5e2e;
      --good: #188657;
      --bad: #c2413b;
      --shadow: 0 18px 42px rgba(23, 32, 51, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #edf7f3 0, var(--bg) 360px);
      letter-spacing: 0;
    }

    button, input, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(26px, 5vw, 44px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .home-link,
    .tab,
    .mode-btn,
    .plain-btn,
    .primary-btn,
    .danger-btn {
      min-height: 38px;
      padding: 0 13px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      text-decoration: none;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      background: rgba(255, 255, 255, 0.82);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .tabs,
    .mode-switch,
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tab.active,
    .mode-btn.active,
    .plain-btn.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .primary-btn {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .danger-btn {
      color: var(--bad);
      border-color: rgba(194, 65, 59, 0.35);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 16px;
      align-items: start;
    }

    .quiz-panel,
    .side-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .quiz-panel {
      min-height: 560px;
      display: flex;
      flex-direction: column;
    }

    .question-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--line);
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 13px;
      background: var(--soft);
      color: var(--accent);
      border: 1px solid rgba(47, 125, 98, 0.18);
    }

    .badge.source {
      color: var(--accent-2);
      background: #f7f1e7;
      border-color: rgba(123, 94, 46, 0.18);
    }

    .counter {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .question-body {
      padding: 22px 20px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .prompt {
      margin: 0 0 18px;
      font-size: clamp(20px, 3.2vw, 26px);
      line-height: 1.55;
      font-weight: 700;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .option-btn {
      width: 100%;
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-height: 54px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      text-align: left;
    }

    .option-btn .letter {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #edf2f7;
      font-weight: 700;
    }

    .option-btn.selected { border-color: var(--accent); background: #f1fbf6; }
    .option-btn.correct { border-color: rgba(24, 134, 87, 0.6); background: #eefaf4; }
    .option-btn.wrong { border-color: rgba(194, 65, 59, 0.55); background: #fff1f1; }

    .answer-box {
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--ink);
      background: #fff;
      resize: vertical;
      outline: none;
    }

    .answer-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 125, 98, 0.12);
    }

    textarea.answer-box {
      min-height: 150px;
      line-height: 1.7;
    }

    .feedback {
      min-height: 74px;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px dashed var(--line);
      background: #f8fafc;
      color: var(--muted);
      line-height: 1.65;
    }

    .feedback.good { color: var(--good); border-color: rgba(24, 134, 87, 0.35); background: #f0fbf6; }
    .feedback.bad { color: var(--bad); border-color: rgba(194, 65, 59, 0.35); background: #fff5f4; }

    .feedback .answer {
      display: block;
      margin-top: 6px;
      color: var(--ink);
      word-break: break-word;
    }

    .actions { padding: 0 20px 20px; }
    .side-panel { padding: 16px; }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .metric strong {
      display: block;
      font-size: 24px;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    .metric span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .progress-shell {
      height: 10px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
      margin: 8px 0 18px;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), #3f8fb0);
      transition: width 0.2s ease;
    }

    .mini-title {
      margin: 16px 0 8px;
      font-size: 15px;
      color: var(--ink);
    }

    .mistakes {
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
      padding-right: 4px;
    }

    .mistake-btn {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px;
      text-align: left;
      line-height: 1.45;
    }

    .empty {
      color: var(--muted);
      line-height: 1.65;
      margin: 0;
    }

    @media (max-width: 860px) {
      .topbar,
      .toolbar,
      .grid {
        grid-template-columns: 1fr;
      }

      .topbar { align-items: stretch; }
      .home-link { width: fit-content; }
      .toolbar, .grid { display: grid; }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 18px, 1120px);
        padding-top: 14px;
      }

      .toolbar,
      .question-head,
      .question-body,
      .actions,
      .side-panel {
        padding-left: 12px;
        padding-right: 12px;
      }

      .question-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .tab,
      .mode-btn,
      .plain-btn,
      .primary-btn,
      .danger-btn {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>思修背记刷题</h1>
        <p>以 2021 级《思想道德与法治》知识点为准，已剔除时事题</p>
      </div>
      <a class="home-link" href="/">返回博客</a>
    </header>

    <section class="toolbar" aria-label="刷题控制">
      <div class="tabs" id="typeTabs"></div>
      <div class="mode-switch" id="orderTabs">
        <button class="mode-btn active" type="button" data-order="sequential">顺序</button>
        <button class="mode-btn" type="button" data-order="random">随机</button>
      </div>
      <button class="danger-btn" type="button" id="resetBtn">清空记录</button>
    </section>

    <section class="grid">
      <article class="quiz-panel">
        <div class="question-head">
          <div class="badge-row">
            <span class="badge" id="typeBadge"></span>
            <span class="badge source" id="sourceBadge"></span>
          </div>
          <span class="counter" id="counter"></span>
        </div>
        <div class="question-body">
          <p class="prompt" id="prompt"></p>
          <div id="answerArea"></div>
          <div class="feedback" id="feedback"></div>
        </div>
        <div class="actions">
          <button class="plain-btn" type="button" id="prevBtn">上一题</button>
          <button class="primary-btn" type="button" id="checkBtn">判题</button>
          <button class="plain-btn" type="button" id="answerBtn">看答案</button>
          <button class="primary-btn" type="button" id="nextBtn">下一题</button>
        </div>
      </article>

      <aside class="side-panel">
        <div class="metric-grid">
          <div class="metric"><strong id="doneCount">0</strong><span>已做</span></div>
          <div class="metric"><strong id="rightRate">0%</strong><span>正确率</span></div>
          <div class="metric"><strong id="totalCount">0</strong><span>当前题量</span></div>
          <div class="metric"><strong id="mistakeCount">0</strong><span>错题</span></div>
        </div>
        <div class="progress-shell" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
        <button class="plain-btn" type="button" id="mistakeModeBtn">只刷错题</button>
        <h2 class="mini-title">错题本</h2>
        <div class="mistakes" id="mistakes"></div>
      </aside>
    </section>
  </main>

  <script>
    const QUESTION_BANK = [
      { id: "past_2009_law_run", type: "choice", source: "往年题 2009-2010", prompt: "法律的运行是一个从创制、实施到实现的过程，但不包括（ ）。", answer: "C", options: { A: "立法", B: "守法", C: "违法", D: "司法" } },
      { id: "past_2009_equal", type: "choice", source: "往年题 2009-2010", prompt: "法律面前人人平等观念主要体现在（ ）。", answer: "C", options: { A: "公民在立法上一律平等", B: "公民在法律解释上一律平等", C: "公民在守法与适用法律上一律平等", D: "公民在法律理解上一律平等" } },
      { id: "past_2009_law_meaning", type: "choice", source: "往年题 2009-2010", prompt: "下列不属于法律一般含义的是（ ）。", answer: "C", options: { A: "法律是由国家创制并保证实施的行为规范", B: "法律是统治阶级意志的体现", C: "法律是对法院或者法官判决的预测", D: "法律由社会物质生活条件决定" } },
      { id: "past_2009_constitution", type: "choice", source: "往年题 2009-2010", prompt: "下列不属于宪法特征的是（ ）。", answer: "D", options: { A: "宪法在内容上规定国家生活中最根本最重要的方面", B: "宪法在效力上最高", C: "宪法在制定和修改程序上比其他法律更为严格", D: "宪法的稳定性比其他法律更强，所以不能修改" } },
      { id: "past_2009_judicial", type: "choice", source: "往年题改编", prompt: "在我国，司法机关是指（ ）。", answer: "A", options: { A: "国家审判机关和检察机关", B: "全国人大及其常委会", C: "行政机关和监察机关", D: "公安机关和司法行政机关" } },
      { id: "past_2009_law_supreme", type: "judge", source: "往年题改编", prompt: "宪法在中国特色社会主义法律体系中居于统帅地位。", answer: "对" },
      { id: "past_2015_supervision", type: "choice", source: "往年题 2015-2016", prompt: "代表国家行使法律监督权的机关是（ ）。", answer: "B", options: { A: "人民法院", B: "人民检察院", C: "纪委", D: "国务院" } },
      { id: "past_2015_law_run", type: "choice", source: "往年题 2015-2016", prompt: "社会主义法律的运行不包括的环节是（ ）。", answer: "A", options: { A: "法律规划", B: "法律制定", C: "法律执行", D: "法律适用" } },
      { id: "past_2015_fairness", type: "choice", source: "往年题 2015-2016", prompt: "维护社会公平正义的最后一道防线是（ ）。", answer: "C", options: { A: "科学立法", B: "严格执法", C: "公正司法", D: "全民守法" } },
      { id: "past_2015_path", type: "choice", source: "往年题 2015-2016", prompt: "下列不属于中国特色社会主义法治道路要求的是（ ）。", answer: "D", options: { A: "坚持党的领导", B: "坚持人民主体地位", C: "坚持从中国实际出发", D: "照搬西方权力分立模式" } },
      { id: "past_2015_law_will", type: "judge", source: "往年题 2015-2016", prompt: "法律是统治阶级全部意志的体现。", answer: "错" },
      { id: "past_2015_law_force", type: "judge", source: "往年题 2015-2016", prompt: "法律区别于道德规范、宗教规范、风俗习惯的重要特征在于，它由国家创制或认可，且由国家强制力保证实施。", answer: "对" },
      { id: "past_2015_socialist_law_role", type: "judge", source: "往年题 2015-2016", prompt: "我国社会主义法律的重要作用包括维护社会主义政治制度、经济制度、社会秩序以及推动社会改革与进步。", answer: "对" },
      { id: "past_2015_rule_law_thinking", type: "judge", source: "往年题 2015-2016", prompt: "法治思维认为国家法律是治国理政的基本依据，处理法律问题要以事实为依据、以法律为准绳。", answer: "对" },
      { id: "past_2016_law_norm", type: "choice", source: "往年题 2016-2017", prompt: "法律区别于道德规范、宗教规范、风俗习惯等其他社会规范的首要之处在于（ ）。", answer: "A", options: { A: "它是由国家创制并保证实施的社会规范", B: "它是统治阶级意志的体现", C: "它由社会物质生活条件决定", D: "它是人们共同遵守的社会规范" } },
      { id: "past_2016_people_source", type: "choice", source: "往年题 2016-2017", prompt: "依法治国的主体和力量源泉是（ ）。", answer: "C", options: { A: "国家", B: "社会", C: "人民", D: "企业" } },
      { id: "past_2016_rule_human", type: "choice", source: "往年题 2016-2017", prompt: "法治思维和人治思维的分水岭在于（ ）。", answer: "C", options: { A: "有没有法律", B: "法律的多寡", C: "最高的权威是法律还是个人", D: "法律的内容" } },
      { id: "past_2016_constitution_content", type: "judge", source: "往年题 2016-2017", prompt: "我国宪法规定了国家性质、根本政治制度、公民的基本权利和义务，以及国家机构的组织及其职权等。", answer: "对" },
      { id: "past_2016_rule_and_virtue", type: "judge", source: "往年题 2016-2017", prompt: "依法治国和以德治国是治国理政不可或缺的两种方式，法治和德治共同发挥作用，才能做到法安天下、德润人心。", answer: "对" },
      { id: "past_2016_power_limit", type: "judge", source: "往年题 2016-2017", prompt: "权力制约是指国家机关的权力必须受到法律的规制和约束，也就是要把权力关进制度的笼子里。", answer: "对" },
      { id: "past_2016_law_rights", type: "judge", source: "往年题 2016-2017", prompt: "法律权利不仅由法律规定或认可，而且受法律维护和保障。", answer: "对" },
      { id: "past_2017_judicial_fill", type: "fill", source: "往年题 2017-2018", prompt: "在我国，司法机关是指国家__________机关和检察机关。", answers: ["审判"] },
      { id: "past_2017_party_fill", type: "fill", source: "往年题 2017-2018", prompt: "在我国，__________是社会主义法治最根本的保证。", answers: ["党的领导"] },
      { id: "past_2017_sixteen", type: "fill", source: "往年题 2017-2018", prompt: "全面依法治国基本格局可概括为科学立法、严格执法、__________、全民守法。", answers: ["公正司法"] },
      { id: "past_2017_law_exec", type: "choice", source: "往年题 2017-2018", prompt: "法律适用是指（ ）按照法定职权和程序适用法律处理案件的专门活动。", answer: "C", options: { A: "立法机关", B: "行政机关", C: "国家司法机关及其公职人员", D: "社会组织" } },
      { id: "past_2017_law_material", type: "choice", source: "往年题 2017-2018", prompt: "法律是由特定社会的（ ）决定的。", answer: "B", options: { A: "政策和道德规范", B: "物质生活条件", C: "宗教规范", D: "风俗习惯" } },
      { id: "past_2017_constitution_day", type: "choice", source: "往年题 2017-2018", prompt: "我国的国家宪法日是（ ）。", answer: "D", options: { A: "12月1日", B: "12月2日", C: "12月3日", D: "12月4日" } },
      { id: "past_2018_law_def_fill", type: "fill", source: "往年题 2018-2019", prompt: "法律是由国家制定或认可的规范体系，并以__________保障实施。", answers: ["国家强制力"] },
      { id: "past_2018_rule_law_value", type: "fill", source: "往年题 2018-2019", prompt: "法治思维是以法治价值和__________为导向，运用法律原则、法律规则、法律方法思考和处理问题的思维模式。", answers: ["法治精神"] },
      { id: "past_2018_law_supreme", type: "choice", source: "往年题 2018-2019", prompt: "法律至上具体表现为法律的普遍适用性、优先适用性和（ ）。", answer: "D", options: { A: "灵活选择性", B: "个人决定性", C: "权力优先性", D: "不可违抗性" } },
      { id: "past_2018_law_system", type: "choice", source: "往年题 2018-2019", prompt: "本质上是中国特色社会主义制度的法律表现形式的是（ ）。", answer: "A", options: { A: "中国特色社会主义法律体系", B: "中国特色社会主义政治体系", C: "中国特色社会主义法治体系", D: "中国特色社会主义法制体系" } }
    ];

    const KNOWLEDGE_POINTS = [
      { kind: "fact", id: "k001_new_era", source: "知识点 绪论", topic: "新时代关键词", fillPrompt: "新时代是我们理解当前所处__________的关键词。", fillAnswers: ["历史方位"], judgeTrue: "新时代是我们理解当前所处历史方位的关键词。", judgeFalse: "新时代只是一个普通年代称呼，与历史方位无关。", shortAnswer: "新时代是我们理解当前所处历史方位的关键词；中国特色社会主义进入新时代。" },
      { kind: "list", id: "k002_youth_tasks", source: "知识点 绪论", topic: "时代新人要求", items: ["立大志", "明大德", "成大才", "担大任"], wrongs: ["轻理想", "弃责任", "重空谈"], fillPrompt: "当代大学生要努力做到__________、明大德、成大才、担大任。", fillAnswers: ["立大志"], shortAnswer: "当代大学生要立大志、明大德、成大才、担大任，努力成为堪当民族复兴重任的时代新人。" },
      { kind: "list", id: "k003_tasks_meaning", source: "知识点 绪论", topic: "立大志明大德成大才担大任的含义", items: ["立大志是要有崇高的理想信念", "明大德是要锤炼高尚品格", "成大才是要有高强的本领才干", "担大任是要有担当精神"], wrongs: ["立大志就是只追求个人名利", "明大德就是脱离社会实践", "担大任就是回避奉献"], fillPrompt: "成大才，就是要有高强的__________，勤奋学习，全面发展。", fillAnswers: ["本领才干"], shortAnswer: "立大志要有崇高理想信念，明大德要锤炼高尚品格，成大才要有高强本领才干，担大任要有担当精神。" },
      { kind: "fact", id: "k004_life_view", source: "知识点 第一章", topic: "人生观", fillPrompt: "人生观就是人们关于人生目的、人生态度、__________等问题的总观点和总看法。", fillAnswers: ["人生价值"], judgeTrue: "人生观是人们关于人生目的、人生态度、人生价值等问题的总观点和总看法。", judgeFalse: "人生观只讨论职业选择，不涉及人生目的和人生价值。", shortAnswer: "人生观是人们关于人生目的、人生态度、人生价值等问题的总观点和总看法。" },
      { kind: "fact", id: "k005_human_nature", source: "知识点 第一章", topic: "人的本质", fillPrompt: "社会属性是人的__________属性，人的社会关系的总和决定了人的本质。", fillAnswers: ["本质"], judgeTrue: "社会属性是人的本质属性，人的社会关系的总和决定了人的本质。", judgeFalse: "认识人的本质可以脱离具体的历史社会关系。", shortAnswer: "任何人都是处在一定社会关系中从事社会实践活动的人，社会属性是人的本质属性，人的社会关系的总和决定人的本质。" },
      { kind: "fact", id: "k006_full_development", source: "知识点 第一章", topic: "人的全面发展", fillPrompt: "推动和实现人的全面发展是社会发展的__________目标。", fillAnswers: ["根本"], judgeTrue: "推动和实现人的全面发展是社会发展的根本目标。", judgeFalse: "社会发展与社会成员素质提高没有关系。", shortAnswer: "社会成员素质的不断提高是社会发展的重要基础，推动和实现人的全面发展是社会发展的根本目标。" },
      { kind: "fact", id: "k007_person_society", source: "知识点 第一章", topic: "个人与社会关系", fillPrompt: "个人与社会是__________统一的关系，两者相互依存、相互制约、相互促进。", fillAnswers: ["对立"], judgeTrue: "个人与社会是对立统一的关系。", judgeFalse: "个人与社会彼此孤立，个人利益与社会利益毫无联系。", shortAnswer: "个人与社会是对立统一的关系，两者相互依存、相互制约、相互促进；最根本的是个人利益与社会利益的关系。" },
      { kind: "fact", id: "k008_life_view_role", source: "知识点 第一章", topic: "人生观的作用", fillPrompt: "人生观决定着人生道路的方向，也决定着人们行为选择的__________。", fillAnswers: ["价值取向"], judgeTrue: "人生观决定人生道路方向和行为选择的价值取向。", judgeFalse: "人生观不会影响人们对实际生活的态度和选择。", shortAnswer: "人生观决定人生道路方向，也决定人们行为选择的价值取向和对待实际生活的方式。" },
      { kind: "fact", id: "k009_life_purpose", source: "知识点 第一章", topic: "人生目的", fillPrompt: "人生目的是对人为__________这一人生根本问题的认识和回答，是人生观的核心。", fillAnswers: ["什么活着"], judgeTrue: "人生目的是人生观的核心。", judgeFalse: "人生目的只是对生活习惯的描述，不是人生观的核心。", shortAnswer: "人生目的是人们在社会实践中关于自身行为的根本指向和人生追求，是对人为什么活着的回答，是人生观的核心。" },
      { kind: "fact", id: "k010_life_attitude", source: "知识点 第一章", topic: "人生态度", fillPrompt: "人生态度是人们通过生活实践形成的对人生问题的一种相对稳定的心理倾向和__________。", fillAnswers: ["精神状态"], judgeTrue: "人生态度是对人生问题相对稳定的心理倾向和精神状态。", judgeFalse: "人生态度只是一时情绪，没有相对稳定性。", shortAnswer: "人生态度是人们通过生活实践形成的对人生问题的一种相对稳定的心理倾向和精神状态。" },
      { kind: "fact", id: "k011_life_value", source: "知识点 第一章", topic: "人生价值", fillPrompt: "人生价值是指人的生命及其实践活动对于社会和个人所具有的作用和__________。", fillAnswers: ["意义"], judgeTrue: "人生价值体现人的生命及其实践活动对社会和个人的作用和意义。", judgeFalse: "人生价值只等于个人收入高低。", shortAnswer: "人生价值是指人的生命及其实践活动对于社会和个人所具有的作用和意义。" },
      { kind: "list", id: "k012_self_social_value", source: "知识点 第一章", topic: "人生价值的两个方面", items: ["人生的自我价值", "人生的社会价值"], wrongs: ["人生的投机价值", "人生的消费价值", "人生的虚荣价值"], fillPrompt: "人生价值包括人生的__________价值和人生的社会价值。", fillAnswers: ["自我"], shortAnswer: "人生的自我价值主要表现为对自身物质和精神需要的满足程度；人生的社会价值是个体实践活动对社会、他人所具有的价值。" },
      { kind: "fact", id: "k013_value_view", source: "知识点 第一章", topic: "价值观与人生观", fillPrompt: "价值观是人们关于价值的根本观点，对于__________的形成和发展有重要引导作用。", fillAnswers: ["人生观"], judgeTrue: "价值观对于人生观的形成和发展有重要引导作用。", judgeFalse: "价值观与人生观完全无关。", shortAnswer: "世界观是人们对世界以及人与世界关系的总体看法和根本观点；价值观是关于价值的根本观点，对人生观形成和发展有重要引导作用。" },
      { kind: "fact", id: "k014_people_service", source: "知识点 第一章", topic: "服务人民奉献社会", fillPrompt: "服务人民、__________的思想代表了人类社会迄今最先进的人生追求。", fillAnswers: ["奉献社会"], judgeTrue: "服务人民、奉献社会代表了人类社会迄今最先进的人生追求。", judgeFalse: "服务人民、奉献社会不是科学高尚的人生追求。", shortAnswer: "服务人民、奉献社会的思想以其科学而高尚的品质，代表了人类社会迄今最先进的人生追求。" },
      { kind: "fact", id: "k015_people_subject", source: "知识点 第一章", topic: "人民群众地位", fillPrompt: "人民群众是社会历史的__________。", fillAnswers: ["主体"], judgeTrue: "人民群众是社会历史的主体，是财富创造者和社会变革决定力量。", judgeFalse: "人民群众不是社会物质财富和精神财富的创造者。", shortAnswer: "人民群众是社会历史的主体，是社会物质财富和精神财富的创造者，是社会变革的决定力量。" },
      { kind: "fact", id: "k016_value_evaluation", source: "知识点 第一章", topic: "评价人生价值的根本尺度", fillPrompt: "评价一个人的人生有无价值或价值大小，最根本的是看他对__________是否作出贡献及贡献大小。", fillAnswers: ["社会"], judgeTrue: "评价人生价值最根本的是看对社会是否作出贡献及贡献大小。", judgeFalse: "评价人生价值只看个人享受多少。", shortAnswer: "评价人生价值的根本尺度是看实践活动是否符合社会发展客观规律、是否促进历史进步；最根本的是看对社会是否作出贡献及贡献大小。" },
      { kind: "list", id: "k017_value_methods", source: "知识点 第一章", topic: "人生价值评价方法", items: ["能力有大小与贡献须尽力相统一", "物质贡献与精神贡献相统一", "完善自身与贡献社会相统一"], wrongs: ["只看能力不看贡献", "只看物质不看精神", "只看个人不看社会"], fillPrompt: "人生价值评价要坚持能力有大小与贡献须尽力相统一、物质贡献与精神贡献相统一、__________与贡献社会相统一。", fillAnswers: ["完善自身"], shortAnswer: "评价人生价值要坚持能力有大小与贡献须尽力相统一，物质贡献与精神贡献相统一，完善自身与贡献社会相统一。" },
      { kind: "fact", id: "k018_practice_value", source: "知识点 第一章", topic: "实现人生价值的道路", fillPrompt: "社会实践是实现人生价值的__________之路。", fillAnswers: ["必由"], judgeTrue: "社会实践是实现人生价值的必由之路。", judgeFalse: "实现人生价值可以完全脱离社会客观条件和实践。", shortAnswer: "实现人生价值要从社会客观条件、个体自身条件出发；社会实践是实现人生价值的必由之路。" },
      { kind: "fact", id: "k019_ideal_belief_core", source: "知识点 第二章", topic: "理想信念地位", fillPrompt: "理想信念是人的精神世界的核心，是人精神上的“__________”。", fillAnswers: ["钙"], judgeTrue: "理想信念是人的精神世界的核心，是人精神上的钙。", judgeFalse: "理想信念只是可有可无的情绪。", shortAnswer: "理想信念是人的精神世界的核心，是人精神上的“钙”。" },
      { kind: "fact", id: "k020_ideal_def", source: "知识点 第二章", topic: "理想", fillPrompt: "理想是人们在实践中形成的、有实现__________的、对未来社会和自身发展目标的向往与追求。", fillAnswers: ["可能性"], judgeTrue: "理想是实践中形成、有实现可能性的向往与追求。", judgeFalse: "理想是不可能实现的空想。", shortAnswer: "理想是人们在实践中形成的、有实现可能性的、对未来社会和自身发展目标的向往与追求，是世界观、人生观和价值观在奋斗目标上的集中体现。" },
      { kind: "list", id: "k021_ideal_traits", source: "知识点 第二章", topic: "理想的特征", items: ["超越性", "实践性", "时代性"], wrongs: ["随意性", "虚假性", "封闭性"], fillPrompt: "理想具有超越性、__________和时代性。", fillAnswers: ["实践性"], shortAnswer: "理想具有超越性、实践性和时代性。" },
      { kind: "fact", id: "k022_belief_def", source: "知识点 第二章", topic: "信念", fillPrompt: "信念是认知、情感和__________的有机统一体。", fillAnswers: ["意志"], judgeTrue: "信念是认知、情感和意志的有机统一体。", judgeFalse: "信念只是纯粹认知，不包含情感和意志。", shortAnswer: "信念是人们在一定认识基础上确立的对某种思想或事物坚信不疑并身体力行的精神状态，是认知、情感和意志的有机统一体。" },
      { kind: "list", id: "k023_belief_traits", source: "知识点 第二章", topic: "信念的特征", items: ["执着性", "支撑性", "多样性"], wrongs: ["短暂性", "盲目性", "单一性"], fillPrompt: "信念具有执着性、支撑性和__________。", fillAnswers: ["多样性"], shortAnswer: "信念具有执着性、支撑性和多样性。" },
      { kind: "fact", id: "k024_belief_role", source: "知识点 第二章", topic: "理想信念作用", fillPrompt: "理想信念是一个人在精神生活领域“__________”的根本。", fillAnswers: ["安身立命"], judgeTrue: "理想信念提供精神支柱，是精神生活领域安身立命的根本。", judgeFalse: "理想信念不能提供精神支柱。", shortAnswer: "理想信念提供精神支柱，是一个人在精神生活领域安身立命的根本。" },
      { kind: "list", id: "k025_three_confidence", source: "知识点 第二章", topic: "大学生应增强的信仰信念信心", items: ["对马克思主义、共产主义的信仰", "对中国特色社会主义的信念", "对实现中华民族伟大复兴的信心"], wrongs: ["对个人主义的信仰", "对历史虚无主义的信念", "对享乐主义的信心"], fillPrompt: "大学生应增强对马克思主义、共产主义的信仰，对中国特色社会主义的信念，对实现中华民族伟大复兴的__________。", fillAnswers: ["信心"], shortAnswer: "大学生应增强对马克思主义、共产主义的信仰，对中国特色社会主义的信念，对实现中华民族伟大复兴的信心，把个人理想追求融入党和国家事业之中。" },
      { kind: "fact", id: "k026_marxism", source: "知识点 第二章", topic: "马克思主义", fillPrompt: "马克思主义作为我们立党立国的根本__________思想，是近代以来中国历史发展的必然结果。", fillAnswers: ["指导"], judgeTrue: "马克思主义是我们立党立国的根本指导思想。", judgeFalse: "马克思主义不是中国人民长期探索的历史选择。", shortAnswer: "马克思主义是我们立党立国的根本指导思想，是近代以来中国历史发展的必然结果，是中国人民长期探索的历史选择。" },
      { kind: "fact", id: "k027_communism", source: "知识点 第二章", topic: "共产主义社会", fillPrompt: "共产主义社会是物质财富极大丰富、实现按需分配、人的精神境界极大提高、每个人__________而全面发展的社会。", fillAnswers: ["自由"], judgeTrue: "共产主义社会是每个人自由而全面发展的社会。", judgeFalse: "共产主义只是短期目标，不包含长远目标。", shortAnswer: "共产主义社会是物质财富极大丰富、实现按需分配、人的精神境界极大提高、每个人自由而全面发展的社会；共产主义是实现运动和长远目标相统一的过程。" },
      { kind: "fact", id: "k028_cpc_leadership", source: "知识点 第二章", topic: "中国共产党领导", fillPrompt: "中国共产党领导是中国特色社会主义最__________的特征。", fillAnswers: ["本质"], judgeTrue: "中国共产党领导是中国特色社会主义最本质的特征，是中国特色社会主义制度的最大优势。", judgeFalse: "中国共产党领导不是中国特色社会主义制度优势。", shortAnswer: "中国共产党领导是中国特色社会主义最本质的特征，是中国特色社会主义制度的最大优势，是党和国家的根本所在、命脉所在。" },
      { kind: "fact", id: "k029_china_dream", source: "知识点 第二章", topic: "中国梦", fillPrompt: "实现中华民族伟大复兴，就是要实现国家富强、民族振兴、__________。", fillAnswers: ["人民幸福"], judgeTrue: "中国梦就是要实现国家富强、民族振兴、人民幸福。", judgeFalse: "中国梦只体现少数人的利益和期盼。", shortAnswer: "实现中华民族伟大复兴是中华民族近代以来最伟大的梦想，就是要实现国家富强、民族振兴、人民幸福。" },
      { kind: "fact", id: "k030_personal_social_ideal", source: "知识点 第二章", topic: "个人理想与社会理想", fillPrompt: "在整个理想体系中，__________理想是最根本、最重要的。", fillAnswers: ["社会"], judgeTrue: "把个人理想融入社会理想之中是大学生成长成才的必由之路。", judgeFalse: "个人理想与社会理想完全对立，不能统一。", shortAnswer: "把个人理想融入社会理想之中，在为实现社会理想而奋斗的过程中实现个人理想，是大学生成长成才的必由之路；社会理想最根本、最重要。" },
      { kind: "fact", id: "k031_china_spirit", source: "知识点 第三章", topic: "中国精神", fillPrompt: "中国精神是指以爱国主义为核心的民族精神和以__________为核心的时代精神。", fillAnswers: ["改革创新"], judgeTrue: "中国精神是以爱国主义为核心的民族精神和以改革创新为核心的时代精神。", judgeFalse: "中国精神与爱国主义和改革创新无关。", shortAnswer: "中国精神是以爱国主义为核心的民族精神和以改革创新为核心的时代精神。" },
      { kind: "list", id: "k032_four_great_spirits", source: "知识点 第三章", topic: "中国精神的四个伟大精神", items: ["伟大创造精神", "伟大奋斗精神", "伟大团结精神", "伟大梦想精神"], wrongs: ["伟大消费精神", "伟大保守精神", "伟大虚无精神"], fillPrompt: "伟大创造精神、伟大奋斗精神、伟大团结精神、__________精神，是对中国精神内涵的系统阐释。", fillAnswers: ["伟大梦想"], shortAnswer: "伟大创造精神、伟大奋斗精神、伟大团结精神、伟大梦想精神，是对中国精神内涵的系统阐释。" },
      { kind: "fact", id: "k033_cpc_china_spirit", source: "知识点 第三章", topic: "中国共产党与中国精神", fillPrompt: "中国共产党是中国精神的忠实继承者和坚定__________者。", fillAnswers: ["弘扬"], judgeTrue: "中国共产党是中国精神的忠实继承者和坚定弘扬者。", judgeFalse: "中国共产党不是中国精神的继承者和弘扬者。", shortAnswer: "中国共产党是中国精神的忠实继承者和坚定弘扬者。" },
      { kind: "list", id: "k034_found_party_spirit", source: "知识点 第三章", topic: "伟大建党精神", items: ["坚持真理、坚守理想", "践行初心、担当使命", "不怕牺牲、英勇斗争", "对党忠诚、不负人民"], wrongs: ["放弃理想", "逃避使命", "脱离人民"], fillPrompt: "伟大建党精神包括坚持真理、坚守理想，践行初心、担当使命，不怕牺牲、英勇斗争，对党忠诚、__________。", fillAnswers: ["不负人民"], shortAnswer: "伟大建党精神是坚持真理、坚守理想，践行初心、担当使命，不怕牺牲、英勇斗争，对党忠诚、不负人民，是中国共产党的精神之源。" },
      { kind: "list", id: "k035_patriotism_content", source: "知识点 第三章", topic: "爱国主义基本内涵", items: ["爱祖国的大好河山", "爱自己的骨肉同胞", "爱祖国的灿烂文化", "爱自己的国家"], wrongs: ["爱个人特权", "爱狭隘地域", "爱历史虚无"], fillPrompt: "爱国主义的基本内涵包括爱祖国的大好河山、爱自己的骨肉同胞、爱祖国的灿烂文化以及__________。", fillAnswers: ["爱自己的国家"], shortAnswer: "爱国主义的基本内涵主要表现为爱祖国的大好河山、爱自己的骨肉同胞、爱祖国的灿烂文化以及爱自己的国家。" },
      { kind: "fact", id: "k036_loved_country", source: "知识点 第三章", topic: "我们爱的国", fillPrompt: "我们爱的“国”是中国共产党领导的__________中国。", fillAnswers: ["社会主义"], judgeTrue: "我们爱的国是中国共产党领导的社会主义中国。", judgeFalse: "我们爱的国可以脱离中国共产党领导和社会主义性质。", shortAnswer: "我们爱的“国”是中国共产党领导的社会主义中国。" },
      { kind: "list", id: "k037_new_patriotism", source: "知识点 第三章", topic: "新时代爱国主义要求", items: ["坚持爱国爱党爱社会主义相统一", "维护祖国统一和民族团结", "尊重和传承中华民族历史和文化", "坚持立足民族又面向世界"], wrongs: ["割裂爱国爱党爱社会主义", "破坏民族团结", "否定民族历史文化"], fillPrompt: "大力弘扬新时代爱国主义，必须坚持爱国爱党爱社会主义相统一，维护祖国统一和民族团结，尊重和传承中华民族历史和文化，坚持__________。", fillAnswers: ["立足民族又面向世界"], shortAnswer: "弘扬新时代爱国主义，必须坚持爱国爱党爱社会主义相统一、维护祖国统一和民族团结、尊重和传承中华民族历史和文化、坚持立足民族又面向世界。" },
      { kind: "fact", id: "k038_reform_innovation", source: "知识点 第三章", topic: "改革创新精神", fillPrompt: "弘扬以改革创新为核心的时代精神，就是要树立突破陈规、大胆探索、敢于__________的思想观念。", fillAnswers: ["创造"], judgeTrue: "弘扬改革创新精神要树立突破陈规、大胆探索、敢于创造的思想观念。", judgeFalse: "改革创新精神要求固守错误和教条式思想观念。", shortAnswer: "弘扬以改革创新为核心的时代精神，就是要树立突破陈规、大胆探索、敢于创造的思想观念，从不合实际、不合规律及错误教条式观念中解放出来。" },
      { kind: "fact", id: "k039_core_values_def", source: "知识点 第四章", topic: "核心价值观", fillPrompt: "核心价值观是一定社会形态、社会性质的集中体现，在社会思想观念体系中处于__________地位。", fillAnswers: ["主导"], judgeTrue: "核心价值观体现社会制度阶级属性、社会运行基本原则和社会发展基本方向。", judgeFalse: "核心价值观在社会思想观念体系中处于边缘地位。", shortAnswer: "核心价值观是一定社会形态、社会性质的集中体现，在一个社会的思想观念体系中处于主导地位。" },

      { kind: "list", id: "k042_core_values_features", source: "知识点 第四章", topic: "社会主义核心价值观显著特征", items: ["反映人类社会发展进步的价值理念", "彰显人民至上的价值立场", "因真实可信而具有强大的道义力量"], wrongs: ["宣扬个人至上", "脱离真实实践", "否定人民立场"], fillPrompt: "社会主义核心价值观的显著特征包括反映人类社会发展进步的价值理念、彰显人民至上的价值立场、因__________而具有强大的道义力量。", fillAnswers: ["真实可信"], shortAnswer: "社会主义核心价值观的显著特征是反映人类社会发展进步的价值理念、彰显人民至上的价值立场、因真实可信而具有强大的道义力量。" },
      { kind: "fact", id: "k043_people_nature", source: "知识点 第四章", topic: "社会主义核心价值观根本特性", fillPrompt: "__________是社会主义核心价值观的根本特性。", fillAnswers: ["人民性"], judgeTrue: "人民性是社会主义核心价值观的根本特性。", judgeFalse: "社会主义核心价值观的根本特性是少数人特权性。", shortAnswer: "社会主义核心价值观具有先进性、人民性和真实性；人民性是其根本特性。" },
      { kind: "fact", id: "k044_universal_value", source: "知识点 第四章", topic: "所谓普世价值", fillPrompt: "所谓“普世价值”是一种极具迷惑性、欺骗性并且带有鲜明__________倾向的价值观。", fillAnswers: ["政治"], judgeTrue: "反对西方所谓普世价值，并不是说人类社会不存在共同价值。", judgeFalse: "反对西方所谓普世价值就是否认人类社会存在共同价值。", shortAnswer: "“普世价值”是一种极具迷惑性、欺骗性并且带有鲜明政治倾向的价值观；我们主张求同存异、和而不同，尊重文明多样性和各国自主选择。" },

      { kind: "fact", id: "k046_morality_def", source: "知识点 第五章", topic: "道德", fillPrompt: "道德是以__________为评价方式，主要依靠社会舆论、传统习俗和内心信念发挥作用的行为规范总和。", fillAnswers: ["善恶"], judgeTrue: "道德是一种特殊的社会意识形态。", judgeFalse: "道德主要依靠国家强制力发挥作用。", shortAnswer: "道德是一种特殊的社会意识形态，是以善恶为评价方式，主要依靠社会舆论、传统习俗和内心信念发挥作用的行为规范总和。" },
      { kind: "list", id: "k047_morality_origin", source: "知识点 第五章", topic: "道德产生条件", items: ["劳动是道德起源的首要前提", "社会关系是道德赖以产生的客观条件", "人的自我意识是道德产生的主观条件"], wrongs: ["金钱是道德起源的首要前提", "孤立个人是道德产生的客观条件", "本能冲动是道德产生的主观条件"], fillPrompt: "劳动是道德起源的首要前提，社会关系是道德赖以产生的客观条件，人的__________是道德产生的主观条件。", fillAnswers: ["自我意识"], shortAnswer: "劳动是道德起源的首要前提，社会关系是道德赖以产生的客观条件，人的自我意识是道德产生的主观条件。" },
      { kind: "fact", id: "k048_morality_economic", source: "知识点 第五章", topic: "道德与经济关系", fillPrompt: "道德是反映社会经济关系的特殊意识形态，也是社会__________关系的特殊调节方式。", fillAnswers: ["利益"], judgeTrue: "道德是社会利益关系的特殊调节方式。", judgeFalse: "道德与社会经济关系无关。", shortAnswer: "道德是反映社会经济关系的特殊意识形态，也是社会利益关系的特殊调节方式。" },
      { kind: "list", id: "k049_morality_functions", source: "知识点 第五章", topic: "道德的基本功能", items: ["认识功能", "规范功能", "调节功能"], wrongs: ["审判功能", "强制执行功能", "行政许可功能"], fillPrompt: "在道德的功能系统中，认识功能、规范功能、__________功能是最基本的功能。", fillAnswers: ["调节"], shortAnswer: "在道德的功能系统中，认识功能、规范功能、调节功能是最基本的功能。" },
      { kind: "fact", id: "k050_morality_core_question", source: "知识点 第五章", topic: "道德核心问题", fillPrompt: "为什么人服务是道德的__________问题。", fillAnswers: ["核心"], judgeTrue: "为什么人服务决定并体现道德建设的根本性质和发展方向。", judgeFalse: "为什么人服务不是道德领域的重要问题。", shortAnswer: "为什么人服务是道德的核心问题，决定并体现道德建设的根本性质和发展方向，规定并制约道德领域中的所有道德现象。" },
      { kind: "fact", id: "k051_people_service_morality", source: "知识点 第五章", topic: "社会主义道德核心", fillPrompt: "为人民服务作为社会主义道德的__________，是社会主义道德区别和优越于其他社会形态道德的显著标志。", fillAnswers: ["核心"], judgeTrue: "为人民服务是社会主义道德的核心。", judgeFalse: "社会主义道德的核心不是为人民服务。", shortAnswer: "为人民服务作为社会主义道德的核心，是社会主义道德区别和优越于其他社会形态道德的显著标志。" },

      { kind: "fact", id: "k053_traditional_revolution", source: "知识点 第五章", topic: "传统美德与革命道德", fillPrompt: "中华传统美德是中华文化的__________；中国革命道德是社会主义道德的红色基因。", fillAnswers: ["精髓"], judgeTrue: "中国革命道德是对中华传统美德的继承和发展。", judgeFalse: "中国革命道德与中华传统美德没有关系。", shortAnswer: "中华传统美德是中华文化的精髓，蕴含丰富思想道德资源；中国革命道德是对中华传统美德的继承和发展，是社会主义道德的红色基因。" },
      { kind: "list", id: "k054_traditional_virtue", source: "知识点 第五章", topic: "中华传统美德基本精神", items: ["重视整体利益，强调责任奉献", "推崇仁爱原则，注重以和为贵", "注重人伦关系，重视道德义务", "追求精神境界，向往理想人格", "强调道德修养，注重道德践履"], wrongs: ["重视个人特权", "推崇损人利己", "否定道德修养"], fillPrompt: "中华传统美德基本精神包括重视整体利益、推崇仁爱原则、注重人伦关系、追求精神境界、强调__________修养。", fillAnswers: ["道德"], shortAnswer: "中华传统美德基本精神包括重视整体利益、强调责任奉献；推崇仁爱原则、注重以和为贵；注重人伦关系、重视道德义务；追求精神境界、向往理想人格；强调道德修养、注重道德践履。" },
      { kind: "list", id: "k055_wrong_tradition", source: "知识点 第五章", topic: "对待传统道德的错误思潮", items: ["复古论", "虚无论"], wrongs: ["辩证继承", "创造性转化", "创新性发展"], fillPrompt: "在对待传统道德的问题上，要反对“复古论”和“__________”。", fillAnswers: ["虚无论"], shortAnswer: "在对待传统道德的问题上，要反对“复古论”和“虚无论”两种错误思潮。" },
      { kind: "list", id: "k056_revolution_morality_content", source: "知识点 第五章", topic: "中国革命道德主要内容", items: ["为实现社会主义和共产主义的理想信念而奋斗", "全心全意为人民服务", "始终把革命利益放在首位", "树立社会新风，建立新型人际关系", "修身自律，保持节操"], wrongs: ["个人利益至上", "脱离人民服务", "破坏社会新风"], fillPrompt: "中国革命道德主要内容包括为理想信念而奋斗、全心全意为人民服务、始终把革命利益放在首位、树立社会新风建立新型人际关系、修身自律保持__________。", fillAnswers: ["节操"], shortAnswer: "中国革命道德主要内容包括为实现社会主义和共产主义的理想信念而奋斗，全心全意为人民服务，始终把革命利益放在首位，树立社会新风、建立新型人际关系，修身自律、保持节操。" },
      { kind: "list", id: "k057_revolution_morality_value", source: "知识点 第五章", topic: "中国革命道德意义", items: ["有利于加强和巩固社会主义和共产主义的理想信念", "有利于培育和践行社会主义核心价值观", "有利于引导人们树立正确的道德观", "有利于培育良好的社会道德风尚"], wrongs: ["削弱理想信念", "阻碍核心价值观", "破坏社会道德风尚"], fillPrompt: "中国革命道德有利于加强和巩固理想信念，培育和践行社会主义核心价值观，引导人们树立正确道德观，培育良好的社会__________。", fillAnswers: ["道德风尚"], shortAnswer: "中国革命道德有利于加强和巩固社会主义和共产主义的理想信念，有利于培育和践行社会主义核心价值观，有利于引导人们树立正确道德观，有利于培育良好的社会道德风尚。" },
      { kind: "fact", id: "k058_socialist_morality", source: "知识点 第五章", topic: "弘扬社会主义道德", fillPrompt: "弘扬社会主义道德，必须坚持以为人民服务为核心，以__________主义为原则。", fillAnswers: ["集体"], judgeTrue: "弘扬社会主义道德要以为人民服务为核心，以集体主义为原则。", judgeFalse: "弘扬社会主义道德要以个人主义为核心。", shortAnswer: "弘扬社会主义道德，必须坚持以为人民服务为核心，以集体主义为原则，推进社会公德、职业道德、家庭美德、个人品德建设。" },
      { kind: "fact", id: "k059_social_morality", source: "知识点 第五章", topic: "社会公德", fillPrompt: "社会公德是维护公共利益、公共秩序、社会和谐稳定的__________的道德要求。", fillAnswers: ["起码"], judgeTrue: "社会公德涵盖人与人、人与社会、人与自然之间的关系。", judgeFalse: "社会公德只涉及私人生活，不涉及公共生活。", shortAnswer: "社会公德是人们在社会交往和公共生活中应遵守的行为准则，是维护公共利益、公共秩序、社会和谐稳定的起码道德要求，涵盖人与人、人与社会、人与自然之间的关系。" },
      { kind: "list", id: "k060_professional_morality", source: "知识点 第五章", topic: "职业生活基本道德规范", items: ["爱岗敬业", "诚实守信", "办事公道", "热情服务", "奉献社会"], wrongs: ["弄虚作假", "徇私舞弊", "逃避服务"], fillPrompt: "职业生活中的基本道德规范包括爱岗敬业、诚实守信、办事公道、热情服务和__________。", fillAnswers: ["奉献社会"], shortAnswer: "爱岗敬业、诚实守信、办事公道、热情服务和奉献社会是职业生活中的基本道德规范。" },

    function pushPointQuestions(point) {
      const source = point.source || "知识点";
      if (point.kind === "fact") {
        return [
          { id: `${point.id}_fill`, type: "fill", source, prompt: point.fillPrompt, answers: point.fillAnswers },
          { id: `${point.id}_judge_t`, type: "judge", source, prompt: point.judgeTrue, answer: "对" },
          { id: `${point.id}_judge_f`, type: "judge", source, prompt: point.judgeFalse, answer: "错" },
          { id: `${point.id}_short`, type: "short", source, prompt: `简述${point.topic}。`, answer: point.shortAnswer, aliases: [point.shortAnswer] }
        ];
      }
      if (point.kind === "list") {
        const fillPrompt = point.fillPrompt || `${point.topic}包括__________。`;
        const blankCount = (fillPrompt.match(/_{3,}/g) || []).length;
        const fillAnswers = point.fillAnswers || (blankCount ? point.items.slice(0, blankCount) : point.items);
        const trueText = `${point.topic}包括${point.items.join("、")}。`;
        const falseText = `${point.topic}包括${(point.wrongs && point.wrongs[0]) || "无关内容"}。`;
        const choiceOptions = {
          A: point.items[0],
          B: (point.wrongs && point.wrongs[0]) || "无关内容一",
          C: (point.wrongs && point.wrongs[1]) || "无关内容二",
          D: (point.wrongs && point.wrongs[2]) || "无关内容三"
        };
        const questions = [
          { id: `${point.id}_judge_t`, type: "judge", source, prompt: trueText, answer: "对" },
          { id: `${point.id}_judge_f`, type: "judge", source, prompt: falseText, answer: "错" },
          { id: `${point.id}_choice`, type: "choice", source, prompt: `下列属于${point.topic}的是（ ）。`, answer: "A", options: choiceOptions },
          { id: `${point.id}_short`, type: "short", source, prompt: `简述${point.topic}。`, answer: point.shortAnswer, aliases: [point.shortAnswer] }
        ];
        if (fillPrompt && fillAnswers.length) {
          questions.unshift({ id: `${point.id}_fill`, type: "fill", source, prompt: fillPrompt, answers: fillAnswers });
        }
        return questions;
      }
      if (point.kind === "essay") {
        return [
          { id: `${point.id}_essay`, type: "essay", source, prompt: `结合知识点，论述${point.topic}。`, answer: point.answer, aliases: point.aliases || [] }
        ];
      }
      return [];
    }

    KNOWLEDGE_POINTS.forEach((point) => {
      QUESTION_BANK.push(...pushPointQuestions(point));
    });

    const TYPE_LABEL = {
      all: "全部",
      fill: "填空",
      choice: "选择",
      judge: "判断",
      short: "简答",
      essay: "论述",
      mistakes: "错题"
    };

    const STORE_KEY = "ethics-quiz-state-v1";
    const $ = (id) => document.getElementById(id);

    let state = {
      filter: "all",
      order: "sequential",
      index: 0,
      input: "",
      answered: {},
      mistakes: {}
    };

    let queue = [];
    let queueKey = "";

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
        state = { ...state, ...saved };
      } catch (_) {
        saveState();
      }
    }

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildQueue(keepCurrentId, force = false) {
      let items = QUESTION_BANK;
      if (state.filter === "mistakes") {
        items = QUESTION_BANK.filter((q) => state.mistakes[q.id]);
      } else if (state.filter !== "all") {
        items = QUESTION_BANK.filter((q) => q.type === state.filter);
      }
      const nextKey = `${state.filter}|${state.order}|${items.map((q) => q.id).join("|")}`;
      if (!force && queueKey === nextKey && queue.length) {
        if (keepCurrentId) {
          const found = queue.findIndex((q) => q.id === keepCurrentId);
          state.index = found >= 0 ? found : 0;
        } else if (state.index >= queue.length) {
          state.index = 0;
        }
        return;
      }
      queueKey = nextKey;
      queue = state.order === "random" ? shuffle(items) : [...items];
      if (keepCurrentId) {
        const found = queue.findIndex((q) => q.id === keepCurrentId);
        state.index = found >= 0 ? found : 0;
      } else if (state.index >= queue.length) {
        state.index = 0;
      }
    }

    function normalizeExact(text) {
      return String(text || "")
        .trim()
        .toLowerCase()
        .replace(/[，。、“”‘’；;：:,.!?！？（）()\[\]【】《》<>]/g, "")
        .replace(/\s+/g, "");
    }

    function normalizeSimilarity(text) {
      return normalizeExact(text).replace(/[的地得]/g, "");
    }

    function splitFill(text) {
      return String(text || "")
        .trim()
        .split(/[\s,，;；、/|]+/)
        .filter(Boolean);
    }

    function answerText(q) {
      if (q.type === "fill") return q.answers.join(" ");
      return q.answer;
    }

    function levenshtein(a, b) {
      if (a === b) return 0;
      if (!a.length) return b.length;
      if (!b.length) return a.length;
      let prev = Array.from({ length: b.length + 1 }, (_, i) => i);
      let curr = new Array(b.length + 1);
      for (let i = 1; i <= a.length; i += 1) {
        curr[0] = i;
        for (let j = 1; j <= b.length; j += 1) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          curr[j] = Math.min(curr[j - 1] + 1, prev[j] + 1, prev[j - 1] + cost);
        }
        [prev, curr] = [curr, prev];
      }
      return prev[b.length];
    }

    function similarity(user, refs) {
      const source = normalizeSimilarity(user);
      if (!source) return 0;
      return refs.reduce((best, ref) => {
        const target = normalizeSimilarity(ref);
        const distance = levenshtein(source, target);
        const score = 1 - distance / Math.max(source.length, target.length, 1);
        return Math.max(best, score);
      }, 0);
    }

    function grade(q, value) {
      if (q.type === "choice" || q.type === "judge") {
        return { correct: value === q.answer, detail: "" };
      }
      if (q.type === "fill") {
        const parts = splitFill(value);
        const byParts = parts.length === q.answers.length && q.answers.every((ans, i) => normalizeExact(ans) === normalizeExact(parts[i]));
        const byWhole = normalizeExact(value) === q.answers.map(normalizeExact).join("");
        return { correct: byParts || byWhole, detail: "" };
      }
      const score = similarity(value, [q.answer, ...(q.aliases || [])]);
      return { correct: score >= 0.85, detail: `相似度 ${Math.round(score * 100)}%` };
    }

    function markAnswered(q, value, result) {
      state.answered[q.id] = { value, correct: result.correct, at: Date.now(), detail: result.detail || "" };
      if (result.correct) {
        delete state.mistakes[q.id];
      } else {
        state.mistakes[q.id] = true;
      }
      saveState();
    }

    function escapeHtml(text) {
      return String(text || "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[ch]);
    }

    function setFeedback(result, q) {
      const feedback = $("feedback");
      feedback.className = `feedback ${result.correct ? "good" : "bad"}`;
      feedback.innerHTML = `${result.correct ? "判定正确" : "判定错误"}${result.detail ? "，" + result.detail : ""}<span class="answer">参考答案：${escapeHtml(answerText(q))}</span>`;
    }

    function currentQuestion() {
      return queue[state.index];
    }

    function renderTabs() {
      $("typeTabs").innerHTML = Object.keys(TYPE_LABEL).map((type) => (
        `<button class="tab ${state.filter === type ? "active" : ""}" type="button" data-type="${type}">${TYPE_LABEL[type]}</button>`
      )).join("");
    }

    function renderAnswerArea(q) {
      const saved = state.answered[q.id];
      const savedValue = saved ? saved.value : "";
      if (q.type === "choice") {
        $("checkBtn").style.display = "none";
        $("answerArea").innerHTML = `<div class="options">${Object.entries(q.options).map(([key, text]) => (
          `<button class="option-btn ${savedValue === key ? "selected" : ""}" type="button" data-value="${key}">
            <span class="letter">${key}</span><span>${escapeHtml(text)}</span>
          </button>`
        )).join("")}</div>`;
        return;
      }
      if (q.type === "judge") {
        $("checkBtn").style.display = "none";
        $("answerArea").innerHTML = `<div class="options">
          <button class="option-btn ${savedValue === "对" ? "selected" : ""}" type="button" data-value="对"><span class="letter">对</span><span>判断为正确</span></button>
          <button class="option-btn ${savedValue === "错" ? "selected" : ""}" type="button" data-value="错"><span class="letter">错</span><span>判断为错误</span></button>
        </div>`;
        return;
      }
      $("checkBtn").style.display = "";
      const tag = q.type === "fill" ? "input" : "textarea";
      const placeholder = q.type === "fill" ? "多空答案用空格隔开" : "按要点作答，相似度达到 85% 判对";
      $("answerArea").innerHTML = tag === "input"
        ? `<input class="answer-box" id="textAnswer" value="${escapeHtml(savedValue)}" placeholder="${placeholder}">`
        : `<textarea class="answer-box" id="textAnswer" placeholder="${placeholder}">${escapeHtml(savedValue)}</textarea>`;
    }

    function renderMistakes() {
      const mistakeIds = Object.keys(state.mistakes);
      $("mistakeCount").textContent = String(mistakeIds.length);
      if (!mistakeIds.length) {
        $("mistakes").innerHTML = `<p class="empty">还没有错题。</p>`;
        return;
      }
      $("mistakes").innerHTML = mistakeIds.slice(0, 24).map((id) => {
        const q = QUESTION_BANK.find((item) => item.id === id);
        if (!q) return "";
        return `<button class="mistake-btn" type="button" data-id="${q.id}"><strong>${TYPE_LABEL[q.type]}</strong> ${escapeHtml(q.prompt).slice(0, 56)}</button>`;
      }).join("");
    }

    function renderStats() {
      const answered = Object.values(state.answered);
      const right = answered.filter((item) => item.correct).length;
      $("doneCount").textContent = String(answered.length);
      $("rightRate").textContent = answered.length ? `${Math.round(right / answered.length * 100)}%` : "0%";
      $("totalCount").textContent = String(queue.length);
      $("progressBar").style.width = queue.length ? `${Math.min(100, answered.length / QUESTION_BANK.length * 100)}%` : "0";
      renderMistakes();
    }

    function renderQuestion() {
      renderTabs();
      syncModeButtons();
      buildQueue();
      const q = currentQuestion();
      renderStats();
      if (!q) {
        $("typeBadge").textContent = TYPE_LABEL[state.filter] || "题目";
        $("sourceBadge").textContent = "无题目";
        $("counter").textContent = "0 / 0";
        $("prompt").textContent = "当前分类没有题目。";
        $("answerArea").innerHTML = "";
        $("feedback").className = "feedback";
        $("feedback").textContent = "换一个题型或清空错题后再试。";
        return;
      }
      $("typeBadge").textContent = TYPE_LABEL[q.type];
      $("sourceBadge").textContent = q.source;
      $("counter").textContent = `${state.index + 1} / ${queue.length}`;
      $("prompt").textContent = q.prompt;
      renderAnswerArea(q);
      const saved = state.answered[q.id];
      if (saved) {
        setFeedback({ correct: saved.correct, detail: saved.detail }, q);
      } else {
        $("feedback").className = "feedback";
        $("feedback").textContent = q.type === "fill" ? "填空题多空请用空格隔开。" : "选择、判断会自动判题；简答和论述按参考答案相似度判定。";
      }
      document.querySelectorAll(".option-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const value = btn.dataset.value;
          const result = grade(q, value);
          markAnswered(q, value, result);
          renderQuestion();
          document.querySelectorAll(".option-btn").forEach((option) => {
            if (option.dataset.value === q.answer) option.classList.add("correct");
            if (option.dataset.value === value && !result.correct) option.classList.add("wrong");
          });
        });
      });
    }

    function checkCurrent() {
      const q = currentQuestion();
      if (!q) return;
      let value = "";
      if (q.type === "choice" || q.type === "judge") {
        const selected = document.querySelector(".option-btn.selected");
        value = selected ? selected.dataset.value : "";
      } else {
        value = $("textAnswer").value;
      }
      const result = grade(q, value);
      markAnswered(q, value, result);
      setFeedback(result, q);
      renderStats();
    }

    function move(delta) {
      if (!queue.length) return;
      state.index = (state.index + delta + queue.length) % queue.length;
      saveState();
      renderQuestion();
    }

    function bindEvents() {
      $("typeTabs").addEventListener("click", (event) => {
        const btn = event.target.closest("[data-type]");
        if (!btn) return;
        state.filter = btn.dataset.type;
        state.index = 0;
        queueKey = "";
        saveState();
        renderQuestion();
      });
      $("orderTabs").addEventListener("click", (event) => {
        const btn = event.target.closest("[data-order]");
        if (!btn) return;
        state.order = btn.dataset.order;
        syncModeButtons();
        state.index = 0;
        queueKey = "";
        saveState();
        renderQuestion();
      });
      $("prevBtn").addEventListener("click", () => move(-1));
      $("nextBtn").addEventListener("click", () => move(1));
      $("checkBtn").addEventListener("click", checkCurrent);
      $("answerBtn").addEventListener("click", () => {
        const q = currentQuestion();
        if (!q) return;
        $("feedback").className = "feedback";
        $("feedback").innerHTML = `参考答案：<span class="answer">${escapeHtml(answerText(q))}</span>`;
      });
      $("resetBtn").addEventListener("click", () => {
        if (!confirm("确认清空刷题记录和错题本？")) return;
        state.answered = {};
        state.mistakes = {};
        state.index = 0;
        queueKey = "";
        saveState();
        renderQuestion();
      });
      $("mistakeModeBtn").addEventListener("click", () => {
        state.filter = state.filter === "mistakes" ? "all" : "mistakes";
        state.index = 0;
        queueKey = "";
        saveState();
        renderQuestion();
      });
      $("mistakes").addEventListener("click", (event) => {
        const btn = event.target.closest("[data-id]");
        if (!btn) return;
        state.filter = "all";
        queueKey = "";
        buildQueue(btn.dataset.id, true);
        saveState();
        renderQuestion();
      });
    }

    loadState();
    function syncModeButtons() {
      document.querySelectorAll("#orderTabs .mode-btn").forEach((item) => item.classList.toggle("active", item.dataset.order === state.order));
      $("mistakeModeBtn").classList.toggle("active", state.filter === "mistakes");
    }

    syncModeButtons();
    buildQueue();
    bindEvents();
    renderQuestion();
  </script>
</body>
</html>
